<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Bệnh Nhân Tuyến Trên</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f4f9;
padding:10px;
}

.header{
background:#1976d2;
color:white;
padding:16px;
border-radius:16px;
margin-bottom:12px;
}

.header h1{
margin-bottom:10px;
font-size:22px;
}

.search-box{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
}

.top-action{
display:flex;
gap:8px;
margin-bottom:12px;
flex-wrap:wrap;
}

.top-action button,
.top-action select{
border:none;
padding:10px;
border-radius:10px;
font-size:13px;
}

.top-action button{
color:white;
font-weight:bold;
cursor:pointer;
}

.btn-add{
background:#2e7d32;
}

.btn-handover{
background:#ef6c00;
}

.year-filter{
background:white;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:12px;
}

.stat-box{
background:white;
border-radius:14px;
padding:12px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.stat-box h2{
color:#1976d2;
font-size:20px;
}

.stat-box p{
color:#666;
margin-top:5px;
font-size:13px;
}

.table-box{
background:white;
border-radius:16px;
overflow:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
min-width:1050px;
table-layout:fixed;
}

thead{
background:#1976d2;
color:white;
}

th,td{
padding:8px 6px;
border-bottom:1px solid #ddd;
text-align:center;
font-size:13px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

td:nth-child(2){
white-space:normal;
line-height:1.3;
font-weight:bold;
text-align:left;
}

.status{
color:white;
padding:4px 6px;
border-radius:8px;
font-size:12px;
}

.dieutri{
background:#2e7d32;
}

.chuyenvien{
background:#ef6c00;
}

.xuatvien{
background:#d32f2f;
}

.action-btn{
border:none;
padding:5px 7px;
border-radius:7px;
color:white;
cursor:pointer;
margin:2px;
font-size:12px;
}

.view-btn{
background:#1976d2;
}

.edit-btn{
background:#388e3c;
}

.delete-btn{
background:#d32f2f;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
width:95%;
max-width:550px;
max-height:90%;
overflow:auto;
border-radius:18px;
padding:20px;
}

.input-box{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
margin-bottom:12px;
}

.save-btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#1976d2;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.close-btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#d32f2f;
color:white;
margin-top:10px;
cursor:pointer;
}

.detail-item{
margin-bottom:10px;
font-size:15px;
}

.handover-box{
background:#f5f5f5;
padding:10px;
border-radius:10px;
margin-top:10px;
margin-bottom:10px;
}

.handover-item{
padding:10px;
border-bottom:1px solid #ddd;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="header">

<h1>🏥 Quản Lý Bệnh Nhân Tuyến Trên</h1>

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Tìm bệnh nhân..."
onkeyup="searchPatient()">

</div>

<div class="top-action">

<select
id="yearFilter"
class="year-filter"
onchange="filterByYear()">

<option value="">Tất cả năm</option>
<option value="2024">2024</option>
<option value="2025">2025</option>
<option value="2026">2026</option>

</select>

<select
id="hospitalFilter"
class="year-filter"
onchange="filterHospital()">

<option value="">Tất cả BV</option>

</select>

<button
class="btn-add"
onclick="openAddModal()">

➕ Thêm BN

</button>

<button
class="btn-handover"
onclick="openHandoverBook()">

📋 Sổ Giao Ca

</button>

</div>

<div class="stats">

<div class="stat-box">
<h2 id="totalPatient">0</h2>
<p>Tổng BN</p>
</div>

<div class="stat-box">
<h2 id="totalDieuTri">0</h2>
<p>Điều trị</p>
</div>

<div class="stat-box">
<h2 id="totalXuatVien">0</h2>
<p>Xuất viện</p>
</div>

<div class="stat-box">
<h2 id="hospitalCount">0</h2>
<p>Số bệnh viện</p>
</div>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th style="width:45px">STT</th>
<th style="width:150px">Họ Tên</th>
<th style="width:70px">NS</th>
<th style="width:55px">GT</th>
<th style="width:120px">BHYT</th>
<th style="width:95px">Nhập Trạm</th>
<th style="width:95px">CV</th>
<th style="width:95px">XV</th>
<th style="width:70px">Đợt</th>
<th style="width:140px">BV</th>
<th style="width:100px">TT</th>
<th style="width:170px">Thao Tác</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="modal" id="addModal">

<div class="modal-content">

<h2>➕ Thêm / Sửa Bệnh Nhân</h2>

<input type="text" id="name" class="input-box" placeholder="Họ tên">

<input type="text" id="birth" class="input-box" placeholder="Năm sinh">

<select id="gender" class="input-box">
<option>Nam</option>
<option>Nữ</option>
</select>

<input type="text" id="bhyt" class="input-box" placeholder="Mã BHYT">

<label>Ngày nhập trạm xá</label>
<input type="date" id="nhaptram" class="input-box">

<label>Ngày chuyển viện</label>
<input type="date" id="cv" class="input-box">

<label>Ngày xuất viện</label>
<input type="date" id="xv" class="input-box">

<input type="text" id="hospital" class="input-box" placeholder="Bệnh viện">

<select id="status" class="input-box">

<option>Điều trị</option>
<option>Chuyển viện</option>
<option>Xuất viện</option>

</select>

<button class="save-btn" onclick="savePatient()">
💾 Lưu
</button>

<button class="close-btn" onclick="closeAddModal()">
Đóng
</button>

</div>

</div>

<div class="modal" id="detailModal">
<div class="modal-content" id="detailContent"></div>
</div>

<div class="modal" id="handoverModal">

<div class="modal-content">

<h2>📋 Sổ Giao Ca</h2>

<div id="handoverBookContent"></div>

<button
class="close-btn"
onclick="closeHandoverBook()">

Đóng

</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
onValue,
remove,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyACL3APi2ZmSK-ZhkSsygSIZvnu8_dvzSc",
authDomain: "ql-benhnhantuyentren.firebaseapp.com",
projectId: "ql-benhnhantuyentren",
storageBucket: "ql-benhnhantuyentren.firebasestorage.app",
messagingSenderId: "127051253047",
appId: "1:127051253047:web:12899a0b0f28d0addd86b2",
measurementId: "G-0JPKGYLJK0"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(
app,
"https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app"
);

let patients = [];
let editId = null;

function formatDate(dateString){

if(!dateString) return "-";

let date = new Date(dateString);

let day =
String(date.getDate()).padStart(2,'0');

let month =
String(date.getMonth()+1).padStart(2,'0');

let year = date.getFullYear();

return `${day}/${month}/${year}`;

}

function loadPatients(){

const patientRef = ref(db,"patients");

onValue(patientRef,(snapshot)=>{

patients = [];

snapshot.forEach((child)=>{

patients.push({
id:child.key,
...child.val()
});

});

renderTable();

});

}

function renderTable(){

let table =
document.getElementById("tableBody");

table.innerHTML = "";

patients.forEach((p,index)=>{

let statusClass="";

if(p.status=="Điều trị"){
statusClass="dieutri";
}

if(p.status=="Chuyển viện"){
statusClass="chuyenvien";
}

if(p.status=="Xuất viện"){
statusClass="xuatvien";
}

table.innerHTML += `

<tr>

<td>${index+1}</td>
<td>${p.name || ""}</td>
<td>${p.birth || ""}</td>
<td>${p.gender || ""}</td>
<td>${p.bhyt || ""}</td>
<td>${formatDate(p.nhaptram)}</td>
<td>${formatDate(p.cv)}</td>
<td>${formatDate(p.xv)}</td>
<td>${p.dotdieutri || 1}</td>
<td>${p.hospital || ""}</td>

<td>
<span class="status ${statusClass}">
${p.status || ""}
</span>
</td>

<td>

<button
class="action-btn view-btn"
onclick="viewPatient('${p.id}')">
Chi tiết
</button>

<button
class="action-btn edit-btn"
onclick="editPatient('${p.id}')">
Sửa
</button>

<button
class="action-btn delete-btn"
onclick="deletePatient('${p.id}')">
Xóa
</button>

</td>

</tr>

`;

});

updateStats();
loadHospitalFilter();

}

function updateStats(){

document.getElementById("totalPatient")
.innerText = patients.length;

document.getElementById("totalDieuTri")
.innerText =
patients.filter(
p=>p.status=="Điều trị"
).length;

document.getElementById("totalXuatVien")
.innerText =
patients.filter(
p=>p.status=="Xuất viện"
).length;

let hospitals =
[...new Set(
patients.map(p=>p.hospital)
)];

document.getElementById("hospitalCount")
.innerText =
hospitals.filter(Boolean).length;

}

function loadHospitalFilter(){

let select =
document.getElementById("hospitalFilter");

let hospitals =
[...new Set(
patients.map(p=>p.hospital)
)];

select.innerHTML =
'<option value="">Tất cả BV</option>';

hospitals.forEach(h=>{

if(h){

select.innerHTML += `
<option value="${h}">
${h}
</option>
`;

}

});

}

window.openAddModal = function(){

document.getElementById("addModal")
.style.display="flex";

}

window.closeAddModal = function(){

document.getElementById("addModal")
.style.display="none";

clearForm();

}

function clearForm(){

document.getElementById("name").value="";
document.getElementById("birth").value="";
document.getElementById("bhyt").value="";
document.getElementById("nhaptram").value="";
document.getElementById("cv").value="";
document.getElementById("xv").value="";
document.getElementById("hospital").value="";

editId = null;

}

window.savePatient = async function(){

let patient = {

name:
document.getElementById("name").value,

birth:
document.getElementById("birth").value,

gender:
document.getElementById("gender").value,

bhyt:
document.getElementById("bhyt").value,

nhaptram:
document.getElementById("nhaptram").value,

cv:
document.getElementById("cv").value,

xv:
document.getElementById("xv").value,

hospital:
document.getElementById("hospital").value,

status:
document.getElementById("status").value,

dotdieutri:1,

handover:[],

history:[]
};

if(editId==null){

patient.history.push({

dot:1,
hospital:patient.hospital,
dateIn:patient.cv || "",
dateOut:patient.xv || "",
status:patient.status

});

const newRef =
push(ref(db,"patients"));

await set(newRef,patient);

}else{

const oldPatient =
patients.find(
p=>p.id===editId
);

patient.handover =
oldPatient.handover || [];

patient.history =
oldPatient.history || [];

patient.dotdieutri =
oldPatient.dotdieutri || 1;

if(oldPatient.hospital != patient.hospital){

patient.dotdieutri++;

patient.history.push({

dot:patient.dotdieutri,
hospital:patient.hospital,
dateIn:patient.cv || "",
dateOut:patient.xv || "",
status:patient.status

});

}

await update(
ref(db,"patients/"+editId),
patient
);

}

closeAddModal();

}

window.editPatient = function(id){

let p =
patients.find(x=>x.id===id);

if(!p) return;

editId=id;

document.getElementById("name").value=p.name || "";
document.getElementById("birth").value=p.birth || "";
document.getElementById("gender").value=p.gender || "";
document.getElementById("bhyt").value=p.bhyt || "";
document.getElementById("nhaptram").value=p.nhaptram || "";
document.getElementById("cv").value=p.cv || "";
document.getElementById("xv").value=p.xv || "";
document.getElementById("hospital").value=p.hospital || "";
document.getElementById("status").value=p.status || "";

openAddModal();

}

window.deletePatient = async function(id){

if(confirm("Xóa bệnh nhân?")){

await remove(
ref(db,"patients/"+id)
);

}

}

window.viewPatient = function(id){

let p =
patients.find(x=>x.id===id);

if(!p) return;

document.getElementById("detailContent")
.innerHTML = `

<h2>👤 ${p.name}</h2>

<div class="detail-item">
<b>Năm sinh:</b> ${p.birth}
</div>

<div class="detail-item">
<b>Giới tính:</b> ${p.gender}
</div>

<div class="detail-item">
<b>BHYT:</b> ${p.bhyt}
</div>

<div class="detail-item">
<b>Ngày nhập trạm:</b>
${formatDate(p.nhaptram)}
</div>

<div class="detail-item">
<b>Bệnh viện hiện tại:</b>
${p.hospital}
</div>

<div class="detail-item">
<b>Đợt điều trị:</b>
${p.dotdieutri || 1}
</div>

<h2 style="margin-top:20px;">
📚 Lịch sử điều trị
</h2>

<div class="handover-box">

${(p.history || []).map(item=>`

<div class="handover-item">

<b>Đợt ${item.dot}</b>

<br><br>

🏥 ${item.hospital}

<br><br>

📅 ${formatDate(item.dateIn)}

→

${item.dateOut
? formatDate(item.dateOut)
: "Đang điều trị"}

<br><br>

📌 ${item.status}

</div>

`).join("")}

</div>

<h2 style="margin-top:20px;">
📋 Giao Ca
</h2>

<div class="handover-box">

${(p.handover || []).map(item=>`

<div class="handover-item">

📅 ${formatDate(item.date)}

<br><br>

📝 ${item.content.replace(/\n/g,"<br>")}

</div>

`).join("")}

</div>

<textarea
id="handoverText"
class="input-box"
placeholder="Nhập giao ca..."
style="height:120px;"></textarea>

<button
class="save-btn"
onclick="saveHandover('${p.id}', this)">

💾 Lưu Giao Ca

</button>

<button
class="close-btn"
onclick="closeDetailModal()">

Đóng

</button>

`;

document.getElementById("detailModal")
.style.display="flex";

}

window.closeDetailModal = function(){

document.getElementById("detailModal")
.style.display="flex";

document.getElementById("detailModal")
.style.display="none";

}

window.saveHandover = async function(id, btn){

btn.disabled=true;
btn.innerText="Đang lưu...";

let p =
patients.find(x=>x.id===id);

let text =
document.getElementById("handoverText")
.value;

if(text.trim()==""){

alert("Chưa nhập giao ca");

btn.disabled=false;
btn.innerText="💾 Lưu Giao Ca";

return;

}

if(!p.handover){
p.handover=[];
}

p.handover.push({

date:new Date()
.toISOString()
.slice(0,10),

content:text

});

await update(
ref(db,"patients/"+id),
{
handover:p.handover
}
);

document.getElementById(
"handoverText"
).value="";

btn.innerText="✔ Đã lưu";

setTimeout(()=>{

btn.disabled=false;
btn.innerText="💾 Lưu Giao Ca";

},1500);

}

window.searchPatient = function(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let rows =
document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

let text =
row.innerText.toLowerCase();

row.style.display =
text.includes(input)
? ""
: "none";

});

}

window.filterByYear = function(){

let year =
document.getElementById("yearFilter")
.value;

let rows =
document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

if(year==""){

row.style.display="";

}else{

row.style.display =
row.innerText.includes(year)
? ""
: "none";

}

});

}

window.filterHospital = function(){

let hospital =
document.getElementById("hospitalFilter")
.value;

let rows =
document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

if(hospital==""){

row.style.display="";

}else{

row.style.display =
row.innerText.includes(hospital)
? ""
: "none";

}

});

}

window.openHandoverBook = function(){

let html = "";

patients.forEach(p=>{

(p.handover || []).forEach(h=>{

html += `

<div class="handover-item">

<b>👤 ${p.name}</b>

<br><br>

📅 ${formatDate(h.date)}

<br><br>

📝 ${h.content.replace(/\n/g,"<br>")}

</div>

`;

});

});

document.getElementById(
"handoverBookContent"
).innerHTML =
html || "Chưa có giao ca";

document.getElementById(
"handoverModal"
).style.display="flex";

}

window.closeHandoverBook = function(){

document.getElementById(
"handoverModal"
).style.display="none";

}

loadPatients();

</script>

</body>
</html>
