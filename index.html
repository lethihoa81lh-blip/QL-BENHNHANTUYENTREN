<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QL Bệnh nhân</title>

<style>
body { font-family: Arial; padding:10px; background:#f4f6f9; }
.box { background:#fff; padding:10px; margin-bottom:10px; border-radius:8px; }
input, button { padding:8px; margin:5px 0; }
table { width:100%; border-collapse:collapse; background:#fff; }
th,td { border:1px solid #ddd; padding:8px; }
th { background:#007bff; color:#fff; }
button { cursor:pointer; }
</style>
</head>

<body>

<h2>QUẢN LÝ BỆNH NHÂN</h2>

<div class="box">
  <input id="name" placeholder="Tên">
  <input id="age" type="number" placeholder="Tuổi">
  <button onclick="addPatient()">Thêm</button>
</div>

<table>
<thead>
<tr>
<th>Tên</th>
<th>Tuổi</th>
<th>Trạng thái</th>
<th>Hành động</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  push,
  onValue,
  update,
  remove,
  get
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyACL3APi2ZmSK-ZhkSsygSIZvnu8_dvzSc",
  authDomain: "ql-benhnhantuyentren.firebaseapp.com",
  databaseURL: "https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "ql-benhnhantuyentren",
  storageBucket: "ql-benhnhantuyentren.firebasestorage.app",
  messagingSenderId: "127051253047",
  appId: "1:127051253047:web:12899a0b0f28d0addd86b2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const patientsRef = ref(db, "patients");
const sessionsRef = ref(db, "sessions");

// =======================
// ADD PATIENT
// =======================
window.addPatient = function () {
  const name = document.getElementById("name").value;
  const age = document.getElementById("age").value;

  if (!name || !age) return alert("Nhập đủ thông tin");

  const newRef = push(patientsRef);

  set(newRef, {
    name,
    age,
    status: "đang"
  });

  addSession(newRef.key, "nhập viện");

  document.getElementById("name").value = "";
  document.getElementById("age").value = "";
};

// =======================
// REALTIME PATIENTS
// =======================
onValue(patientsRef, (snapshot) => {
  render(snapshot.val() || {});
});

// =======================
// RENDER
// =======================
function render(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  Object.keys(data).forEach(id => {
    const p = data[id];

    list.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.age}</td>
        <td>${p.status}</td>
        <td>
          <button onclick="toggleStatus('${id}')">Đổi trạng thái</button>
          <button onclick="deletePatient('${id}')">Xoá</button>
        </td>
      </tr>
    `;
  });
}

// =======================
// TOGGLE STATUS
// =======================
window.toggleStatus = async function(id) {
  const snap = await get(ref(db, "patients/" + id));
  const data = snap.val();

  const newStatus = data.status === "đang" ? "xuất" : "đang";

  update(ref(db, "patients/" + id), {
    status: newStatus
  });

  addSession(id, "đổi trạng thái → " + newStatus);
};

// =======================
// DELETE
// =======================
window.deletePatient = function(id) {
  remove(ref(db, "patients/" + id));
  addSession(id, "xoá bệnh nhân");
};

// =======================
// ADD SESSION LOG
// =======================
function addSession(patientId, action) {
  const newRef = push(sessionsRef);

  set(newRef, {
    patientId,
    action,
    time: Date.now()
  });
}

console.log("SYSTEM READY - 2 NODE VERSION");
</script>

</body>
</html>
