<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QLBN Tuyến Trên - Bản Hoàn Thiện</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .modal-overlay { transition: opacity 0.3s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 font-sans pb-10">

    <section class="p-3 grid grid-cols-4 gap-2">
        <div onclick="filterStatus('')" class="bg-white p-2 rounded-xl shadow-sm border-l-4 border-blue-600 cursor-pointer text-center">
            <span class="text-[9px] font-bold text-slate-500 uppercase">Tổng</span>
            <h3 id="stat-total" class="text-base font-black">0</h3>
        </div>
        <div onclick="filterStatus('treating')" class="bg-amber-50 p-2 rounded-xl shadow-sm border-l-4 border-amber-500 cursor-pointer text-center">
            <span class="text-[9px] font-bold text-amber-800 uppercase">Nằm viện</span>
            <h3 id="stat-treating" class="text-base font-black text-amber-700">0</h3>
        </div>
        <div onclick="filterStatus('discharged')" class="bg-emerald-50 p-2 rounded-xl shadow-sm border-l-4 border-emerald-500 cursor-pointer text-center">
            <span class="text-[9px] font-bold text-emerald-800 uppercase">Xuất viện</span>
            <h3 id="stat-discharged" class="text-base font-black text-emerald-700">0</h3>
        </div>
        <div onclick="filterStatus('deceased')" class="bg-slate-200 p-2 rounded-xl shadow-sm border-l-4 border-slate-600 cursor-pointer text-center">
            <span class="text-[9px] font-bold text-slate-800 uppercase">Tử vong</span>
            <h3 id="stat-deceased" class="text-base font-black text-slate-700">0</h3>
        </div>
    </section>

    <input type="hidden" id="current-filter" value="">

    <script>
        // CẬP NHẬT HÀM RENDER ĐỂ CÓ BỘ LỌC
        function renderList() {
            const tbody = document.getElementById('patient-table-body');
            const filter = document.getElementById('current-filter').value;
            tbody.innerHTML = '';
            
            let t=0, d=0, v=0;
            sessions.forEach(s => {
                if (s.tuVong) v++;
                else if (s.xuatVien) d++;
                else t++;
            });

            document.getElementById('stat-total').textContent = sessions.length;
            document.getElementById('stat-treating').textContent = t;
            document.getElementById('stat-discharged').textContent = d;
            document.getElementById('stat-deceased').textContent = v;

            sessions.forEach(session => {
                const status = session.tuVong ? 'deceased' : (session.xuatVien ? 'discharged' : 'treating');
                if (filter && filter !== status) return;

                // [GIỮ NGUYÊN LOGIC TẠO TR/TD CỦA BẠN TẠI ĐÂY]
                // ...
            });
        }

        function filterStatus(status) {
            document.getElementById('current-filter').value = status;
            renderList();
        }

        // [GIỮ NGUYÊN TOÀN BỘ CÁC HÀM CŨ: saveNewPatient, openPatientDetailSheet,...]
    </script>
</body>
</html>
