<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>QL Bệnh Nhân V2</title>
<style>
body { font-family: Arial; background:#f5f6fa; padding:10px; }
.container { max-width:900px; margin:auto; }
.card { background:#fff; padding:10px; margin:8px 0; border-radius:10px; }
button { cursor:pointer; margin:2px; }
.badge { font-size:11px; padding:2px 6px; border-radius:6px; }
.treating { color:#d97706; }
.discharged { color:#16a34a; }
.death { color:#dc2626; }
</style>
</head>

<body>

<div class="container">

<h2>QUẢN LÝ BỆNH NHÂN</h2>

<!-- FILTER -->
<select id="filter" onchange="render()">
  <option value="">Tất cả</option>
  <option value="treating">Đang nằm viện</option>
  <option value="discharged">Xuất viện</option>
  <option value="death">Tử vong</option>
</select>

<hr>

<!-- FORM -->
<input id="name" placeholder="Tên bệnh nhân">
<button onclick="addPatient()">Thêm</button>

<hr>

<div id="list"></div>

<hr>

<h3>SỔ GIAO CA</h3>
<textarea id="handover" style="width:100%;height:100px"></textarea>
<button onclick="saveHandover()">Lưu giao ca</button>

<div id="handoverList"></div>

</div>

<script>

let patients = JSON.parse(localStorage.getItem("patients")||"[]");
let sessions = JSON.parse(localStorage.getItem("sessions")||"[]");
let handovers = JSON.parse(localStorage.getItem("handovers")||"[]");

function save(){
  localStorage.setItem("patients",JSON.stringify(patients));
  localStorage.setItem("sessions",JSON.stringify(sessions));
  localStorage.setItem("handovers",JSON.stringify(handovers));
}

// thêm bệnh nhân
function addPatient(){
  const name = document.getElementById("name").value;
  if(!name) return;

  const id = Date.now().toString();

  patients.push({id,name});

  sessions.push({
    id: id,
    patientId: id,
    sessionNum: 1,
    hospital: "BV",
    status: "treating",
    xuatVien: ""
  });

  save();
  render();
}

// render
function render(){
  const filter = document.getElementById("filter").value;
  const list = document.getElementById("list");
  list.innerHTML = "";

  sessions.forEach(s => {

    if(filter && (s.status||"treating") !== filter) return;

    const p = patients.find(x=>x.id===s.patientId);
    if(!p) return;

    let cls = s.status||"treating";

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <b>${p.name}</b>
      <span class="badge ${cls}"> ${cls} </span>
      <br>

      <button onclick="discharge('${s.id}')">Xuất viện</button>
      <button onclick="death('${s.id}')">Tử vong</button>
      <button onclick="del('${s.id}')">Xóa</button>
    `;

    list.appendChild(div);
  });
}

// xuất viện
function discharge(id){
  const s = sessions.find(x=>x.id===id);
  if(!s) return;
  s.status="discharged";
  s.xuatVien=new Date().toISOString().split('T')[0];
  save(); render();
}

// tử vong
function death(id){
  const s = sessions.find(x=>x.id===id);
  if(!s) return;
  s.status="death";
  s.xuatVien=new Date().toISOString().split('T')[0];
  save(); render();
}

// xoá
function del(id){
  sessions = sessions.filter(x=>x.id!==id);
  patients = patients.filter(x=>x.id!==id);
  save(); render();
}

// giao ca
function saveHandover(){
  const text = document.getElementById("handover").value;
  handovers.push({
    id: Date.now(),
    text,
    date: new Date().toLocaleString()
  });
  save();
  renderHandover();
}

function renderHandover(){
  const div = document.getElementById("handoverList");
  div.innerHTML = "";

  handovers.slice().reverse().forEach(h=>{
    div.innerHTML += `
      <div class="card">
        <small>${h.date}</small><br>
        ${h.text}
      </div>
    `;
  });
}

render();
renderHandover();

</script>

</body>
</html>
