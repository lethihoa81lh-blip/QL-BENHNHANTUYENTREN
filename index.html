<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QLBN Tuyến Trên</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100 p-3">

    <section class="grid grid-cols-4 gap-2 mb-4">
        <div onclick="filterStatus('')" class="bg-white p-2 rounded-lg border-l-4 border-blue-600 cursor-pointer text-center">
            <p class="text-[9px] font-bold text-slate-500">TỔNG</p>
            <h3 id="stat-total" class="font-black">0</h3>
        </div>
        <div onclick="filterStatus('treating')" class="bg-amber-50 p-2 rounded-lg border-l-4 border-amber-500 cursor-pointer text-center">
            <p class="text-[9px] font-bold text-amber-800">NẰM VIỆN</p>
            <h3 id="stat-treating" class="font-black text-amber-700">0</h3>
        </div>
        <div onclick="filterStatus('discharged')" class="bg-emerald-50 p-2 rounded-lg border-l-4 border-emerald-500 cursor-pointer text-center">
            <p class="text-[9px] font-bold text-emerald-800">XUẤT VIỆN</p>
            <h3 id="stat-discharged" class="font-black text-emerald-700">0</h3>
        </div>
        <div onclick="filterStatus('deceased')" class="bg-slate-200 p-2 rounded-lg border-l-4 border-slate-600 cursor-pointer text-center">
            <p class="text-[9px] font-bold text-slate-800">TỬ VONG</p>
            <h3 id="stat-deceased" class="font-black text-slate-700">0</h3>
        </div>
    </section>

    <div class="bg-white rounded-xl shadow overflow-x-auto">
        <table class="w-full text-[11px] border-collapse">
            <thead class="bg-indigo-900 text-white">
                <tr>
                    <th class="p-2 border">STT</th>
                    <th class="p-2 border text-left">Họ Tên</th>
                    <th class="p-2 border">Bệnh viện</th>
                    <th class="p-2 border">Trạng thái</th>
                </tr>
            </thead>
            <tbody id="patient-table-body"></tbody>
        </table>
    </div>

    <input type="hidden" id="current-filter" value="">

    <script>
        let patients = JSON.parse(localStorage.getItem('qlbn_patients')) || [];
        let sessions = JSON.parse(localStorage.getItem('qlbn_sessions')) || [];

        function filterStatus(status) {
            document.getElementById('current-filter').value = status;
            renderList();
        }

        function renderList() {
            const tbody = document.getElementById('patient-table-body');
            const filter = document.getElementById('current-filter').value;
            tbody.innerHTML = '';
            
            let t=0, d=0, v=0;
            
            sessions.forEach(s => {
                if (s.tuVong) v++;
                else if (s.xuatVien) d++;
                else t++;
            });

            document.getElementById('stat-total').textContent = sessions.length;
            document.getElementById('stat-treating').textContent = t;
            document.getElementById('stat-discharged').textContent = d;
            document.getElementById('stat-deceased').textContent = v;

            let idx = 1;
            sessions.forEach(s => {
                const status = s.tuVong ? 'deceased' : (s.xuatVien ? 'discharged' : 'treating');
                if (filter && filter !== status) return;

                const p = patients.find(x => x.id === s.patientId) || {name: 'Unknown'};
                const tr = document.createElement('tr');
                tr.className = "border-b text-center";
                tr.innerHTML = `
                    <td class="p-2">${idx++}</td>
                    <td class="p-2 text-left font-bold">${p.name}</td>
                    <td class="p-2">${s.hospital}</td>
                    <td class="p-2 font-bold ${s.tuVong ? 'text-red-600' : (s.xuatVien ? 'text-emerald-600' : 'text-amber-600')}">
                        ${s.tuVong ? 'Tử vong' : (s.xuatVien ? 'Xuất viện' : 'Nằm viện')}
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Tự động load khi mở trang
        renderList();
    </script>
</body>
</html>
