<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Bệnh nhân Tuyến Trên</title>

<style>
body{font-family:Arial;margin:0;background:#f1f4f9;}

/* LOGIN */
#loginBox{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#1976d2;display:flex;justify-content:center;align-items:center;
}

.login-card{
background:#fff;padding:20px;border-radius:16px;width:90%;max-width:320px;
text-align:center;
}

.login-card input{
width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #ccc;
}

.login-card button{
width:100%;padding:12px;border:none;border-radius:10px;background:#2e7d32;color:#fff;
}

/* MAIN */
#app{display:none;padding:10px;}

.header{background:#1976d2;color:#fff;padding:16px;border-radius:16px;}
.search-box{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;}

.top-action{display:flex;gap:8px;margin:10px 0;}
.top-action button{padding:10px;border:none;border-radius:10px;color:#fff;}
.btn-add{background:#2e7d32;}
.btn-del{background:#ef6c00;}

.table-box{background:#fff;border-radius:12px;overflow:auto;}

table{width:100%;border-collapse:collapse;min-width:900px;}
th,td{padding:8px;border-bottom:1px solid #ddd;text-align:center;}
th{background:#1976d2;color:#fff;}

.status{padding:4px 6px;border-radius:6px;color:#fff;}
.dieutri{background:#2e7d32;}
.xv{background:#d32f2f;}

.btn{padding:5px 6px;border:none;border-radius:6px;color:#fff;font-size:12px;}
.view{background:#1976d2;}
.edit{background:#388e3c;}
.del{background:#d32f2f;}

.dotbox{display:flex;gap:5px;justify-content:center;margin-top:5px;}
.dotbox button{border:none;padding:2px 6px;color:#fff;border-radius:5px;}
.plus{background:#2e7d32;}
.minus{background:#d32f2f;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login-card">
<h3>🔐 Đăng nhập hệ thống</h3>
<input type="password" id="pass" placeholder="Nhập mật khẩu">
<button onclick="login()">Vào hệ thống</button>
</div>
</div>

<!-- APP -->
<div id="app">

<div class="header">
<h2>🏥 Quản Lý Nuôi Viện PRO</h2>
<input class="search-box" id="search" placeholder="Tìm bệnh nhân..." onkeyup="search()">
</div>

<div class="top-action">
<button class="btn-add" onclick="openAdd()">➕ Thêm BN</button>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>STT</th><th>Họ tên</th><th>NS</th><th>Đợt</th><th>BV</th><th>TT</th><th>Thao tác</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"xxx",
authDomain:"xxx",
databaseURL:"https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"xxx"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let patients=[];
let isAdmin=false;

/* LOGIN */
window.login=function(){
let p=document.getElementById("pass").value;

if(p==="123456"){
isAdmin=true;
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
load();
}else{
alert("Sai mật khẩu");
}
}

/* LOAD */
function load(){
onValue(ref(db,"patients"),snap=>{
patients=[];
snap.forEach(c=>patients.push({id:c.key,...c.val()}));
render();
});
}

/* RENDER */
function render(){
let html="";

patients.forEach((p,i)=>{

html+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.birth||""}</td>

<td>
${p.dotdieutri||1}

<div class="dotbox">
<button class="plus" onclick="dot('${p.id}',1)">+</button>
<button class="minus" onclick="dot('${p.id}',-1)">-</button>
</div>
</td>

<td>${p.hospital||""}</td>

<td><span class="status dieutri">${p.status||""}</span></td>

<td>
<button class="btn view">Xem</button>
<button class="btn edit">Sửa</button>

${isAdmin ? `<button class="btn del" onclick="del('${p.id}')">Xoá</button>` : ""}
</td>
</tr>`;
});

document.getElementById("tb").innerHTML=html;
}

/* ➕➖ ĐỢT */
window.dot=async function(id,v){

let p=patients.find(x=>x.id===id);
if(!p)return;

let d=(p.dotdieutri||1)+v;
if(d<1)d=1;

await update(ref(db,"patients/"+id),{
dotdieutri:d
});
}

/* XOÁ (ADMIN) */
window.del=async function(id){
if(!isAdmin)return;
if(confirm("Xoá bệnh nhân?")){
await remove(ref(db,"patients/"+id));
}
}

</script>

</body>
</html>
