<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QLBN Tuyến Trên - Bản Di Động Tối Giản</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col pb-6">
    <script>
        // CẤU HÌNH FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyACL3APi2ZmSK-ZhkSsygSIZvnu8_dvzSc",
            databaseURL: "https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ql-benhnhantuyentren"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // HÀM LƯU ĐỒNG BỘ
        function saveToLocalStorage() {
            localStorage.setItem('qlbn_patients', JSON.stringify(patients));
            localStorage.setItem('qlbn_sessions', JSON.stringify(sessions));
            localStorage.setItem('qlbn_handovers', JSON.stringify(handovers));
            
            // Đẩy lên Firebase
            db.ref('data').set({
                patients: patients,
                sessions: sessions,
                handovers: handovers
            });
        }

        // TỰ ĐỘNG TẢI DỮ LIỆU KHI MỞ TRANG
        db.ref('data').once('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                patients = data.patients || [];
                sessions = data.sessions || [];
                handovers = data.handovers || [];
                renderList(); // Hàm vẽ lại giao diện của bạn
            }
        });

        // (Phần còn lại là code cũ của bạn, dán tiếp vào đây)
    </script>
</body>
</html>
