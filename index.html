<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Bệnh Nhân Tuyến Trên</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f1f4f9;padding:10px;}

.header{background:#1976d2;color:white;padding:16px;border-radius:16px;margin-bottom:12px;}
.header h1{margin-bottom:10px;font-size:22px;}

.search-box{width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;}

.top-action{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.top-action button,.top-action select{border:none;padding:10px;border-radius:10px;font-size:13px;}
.top-action button{color:white;font-weight:bold;cursor:pointer;}

.btn-add{background:#2e7d32;}
.btn-handover{background:#ef6c00;}
.year-filter{background:white;}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.stat-box{background:white;border-radius:14px;padding:12px;text-align:center;box-shadow:0 3px 8px rgba(0,0,0,0.08);}
.stat-box h2{color:#1976d2;font-size:20px;}
.stat-box p{color:#666;margin-top:5px;font-size:13px;}

.table-box{background:white;border-radius:16px;overflow:auto;box-shadow:0 4px 10px rgba(0,0,0,0.08);}
table{width:100%;border-collapse:collapse;min-width:1050px;table-layout:fixed;}

thead{background:#1976d2;color:white;}
th,td{padding:8px 6px;border-bottom:1px solid #ddd;text-align:center;font-size:13px;white-space:nowrap;}

td:nth-child(2){white-space:normal;font-weight:bold;text-align:left;}

.status{color:white;padding:4px 6px;border-radius:8px;font-size:12px;}
.dieutri{background:#2e7d32;}
.chuyenvien{background:#ef6c00;}
.xuatvien{background:#d32f2f;}

.action-btn{border:none;padding:5px 7px;border-radius:7px;color:white;cursor:pointer;margin:2px;font-size:12px;}
.view-btn{background:#1976d2;}
.edit-btn{background:#388e3c;}
.delete-btn{background:#d32f2f;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:999;}
.modal-content{background:white;width:95%;max-width:550px;max-height:90%;overflow:auto;border-radius:18px;padding:20px;}

.input-box{width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;margin-bottom:12px;}

.save-btn{width:100%;padding:13px;border:none;border-radius:12px;background:#1976d2;color:white;font-weight:bold;}
.close-btn{width:100%;padding:13px;border:none;border-radius:12px;background:#d32f2f;color:white;margin-top:10px;}

.detail-item{margin-bottom:10px;font-size:15px;}
.handover-box{background:#f5f5f5;padding:10px;border-radius:10px;}
.handover-item{padding:10px;border-bottom:1px solid #ddd;margin-bottom:8px;}
</style>
</head>

<body>

<div class="header">
<h1>🏥 Quản Lý Nuôi Viện</h1>

<input class="search-box" id="searchInput" placeholder="🔍 Tìm bệnh nhân..." onkeyup="searchPatient()">
</div>

<div class="top-action">
<button class="btn-add" onclick="openAddModal()">➕ Thêm BN</button>
<button class="btn-handover" onclick="openHandoverBook()">📋 Sổ Giao Ca</button>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>STT</th><th>Họ Tên</th><th>NS</th><th>GT</th>
<th>BHYT</th><th>Nhập</th><th>CV</th><th>XV</th>
<th>Đợt</th><th>BV</th><th>TT</th><th>Thao Tác</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- MODAL -->
<div class="modal" id="addModal">
<div class="modal-content">

<h2>Thêm / Sửa</h2>

<input id="name" class="input-box" placeholder="Họ tên">
<input id="birth" class="input-box" placeholder="Năm sinh">

<select id="gender" class="input-box">
<option>Nam</option><option>Nữ</option>
</select>

<input id="bhyt" class="input-box" placeholder="BHYT">
<input id="nhaptram" type="date" class="input-box">
<input id="cv" type="date" class="input-box">
<input id="xv" type="date" class="input-box">
<input id="hospital" class="input-box" placeholder="BV">

<select id="status" class="input-box">
<option>Điều trị</option>
<option>Chuyển viện</option>
<option>Xuất viện</option>
</select>

<button class="save-btn" onclick="savePatient()">Lưu</button>
<button class="close-btn" onclick="closeAddModal()">Đóng</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, update }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSy...",
authDomain:"ql-benhnhantuyentren.firebaseapp.com",
databaseURL:"https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"ql-benhnhantuyentren",
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let patients=[];
let editId=null;
let isAdmin=true; // 🔐 ADMIN FLAG

function loadPatients(){
onValue(ref(db,"patients"),(snap)=>{
patients=[];
snap.forEach(c=>{
patients.push({id:c.key,...c.val()});
});
renderTable();
});
}

function renderTable(){
let html="";

patients.forEach((p,i)=>{

html+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.birth}</td>
<td>${p.gender}</td>
<td>${p.bhyt}</td>
<td>${p.nhaptram||""}</td>
<td>${p.cv||""}</td>
<td>${p.xv||""}</td>

<td>
${p.dotdieutri||1}
<br>
<button onclick="themDot('${p.id}')"
style="font-size:11px;background:#2e7d32;color:white;border:none;padding:3px 6px;border-radius:6px;">
➕ Đợt
</button>
</td>

<td>${p.hospital}</td>

<td><span class="status">${p.status}</span></td>

<td>
<button class="view-btn" onclick="viewPatient('${p.id}')">Chi tiết</button>
<button class="edit-btn" onclick="editPatient('${p.id}')">Sửa</button>

${isAdmin ? `<button class="delete-btn" onclick="deletePatient('${p.id}')">Xóa</button>` : ""}
</td>

</tr>`;
});

document.getElementById("tableBody").innerHTML=html;
}

window.themDot = async function(id){

let p=patients.find(x=>x.id===id);
if(!p) return;

let newDot=(p.dotdieutri||1)+1;

let history=p.history||[];

history.push({
dot:newDot,
hospital:p.hospital,
dateIn:new Date().toISOString().slice(0,10),
dateOut:"",
status:"Điều trị"
});

await update(ref(db,"patients/"+id),{
dotdieutri:newDot,
history
});
}

window.deletePatient=async function(id){
if(confirm("Xóa?")){
await remove(ref(db,"patients/"+id));
}
}

loadPatients();
</script>

</body>
</html>
