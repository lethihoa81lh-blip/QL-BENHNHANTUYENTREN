<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QLBN Tuyến Trên - Bản Hoàn Chỉnh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .hidden { display: none; }
        .pulse-orange { animation: pulse-orange 2s infinite; }
        @keyframes pulse-orange { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(1.15); } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col pb-6">

    <header class="bg-gradient-to-r from-blue-800 to-indigo-900 text-white shadow-md sticky top-0 z-40 px-4 py-3 flex justify-between items-center">
        <h1 class="font-bold text-sm flex items-center gap-1.5"><i class="fa-solid fa-hospital-user text-teal-300"></i> QL CHUYỂN TUYẾN</h1>
    </header>

    <section class="p-3 grid grid-cols-4 gap-2">
        <div onclick="filterByStat('')" class="bg-white p-2 rounded-xl shadow-sm border-l-4 border-blue-600 cursor-pointer active:scale-95 transition-all">
            <span class="text-[9px] font-bold text-slate-500">TỔNG</span>
            <h3 id="stat-total" class="text-base font-black">0</h3>
        </div>
        <div onclick="filterByStat('treating')" class="bg-amber-50 p-2 rounded-xl shadow-sm border-l-4 border-amber-500 cursor-pointer active:scale-95 transition-all">
            <span class="text-[9px] font-bold text-amber-800">ĐANG ĐT</span>
            <h3 id="stat-treating" class="text-base font-black">0</h3>
        </div>
        <div onclick="filterByStat('discharged')" class="bg-emerald-50 p-2 rounded-xl shadow-sm border-l-4 border-emerald-500 cursor-pointer active:scale-95 transition-all">
            <span class="text-[9px] font-bold text-emerald-800">XUẤT VIỆN</span>
            <h3 id="stat-discharged" class="text-base font-black">0</h3>
        </div>
        <div onclick="filterByStat('deceased')" class="bg-red-50 p-2 rounded-xl shadow-sm border-l-4 border-red-500 cursor-pointer active:scale-95 transition-all">
            <span class="text-[9px] font-bold text-red-800">TỬ VONG</span>
            <h3 id="stat-deceased" class="text-base font-black">0</h3>
        </div>
    </section>

    <section class="px-3 mb-4 flex items-center gap-2">
        <input type="text" id="search-box" oninput="renderList()" placeholder="Tìm kiếm tên bệnh nhân..." class="flex-grow p-2 rounded-xl border border-slate-200 text-sm outline-none">
        <button onclick="window.openHandoverModal()" class="bg-amber-500 text-white p-2 rounded-xl h-8 w-8 shadow active:scale-95 transition-all" title="Sổ Giao Ca">
            <i class="fa-solid fa-clipboard-user"></i>
        </button>
    </section>

    <div id="patient-list" class="px-3 space-y-2"></div>

    <div id="handover-modal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4 z-50">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm shadow-xl animate-in fade-in zoom-in duration-200">
            <h2 class="font-bold text-lg mb-4 text-slate-800 border-b pb-2">Sổ Giao Ca (Đang ĐT)</h2>
            <div id="handover-content" class="text-sm space-y-2 max-h-60 overflow-y-auto"></div>
            <button onclick="document.getElementById('handover-modal').classList.add('hidden')" class="mt-6 w-full bg-slate-800 text-white p-2 rounded-xl font-bold active:scale-95 transition-all">Đóng</button>
        </div>
    </div>

    <script>
        // Dữ liệu bệnh nhân (Bạn có thể thêm dữ liệu vào đây)
        let patients = [
            { id: 1, name: "Nguyễn Văn A", status: "treating" },
            { id: 2, name: "Trần Thị B", status: "deceased" },
            { id: 3, name: "Lê Văn C", status: "discharged" }
        ];

        let currentFilter = '';

        // Hàm cập nhật thống kê
        function updateStats() {
            document.getElementById('stat-total').innerText = patients.length;
            document.getElementById('stat-treating').innerText = patients.filter(p => p.status === 'treating').length;
            document.getElementById('stat-discharged').innerText = patients.filter(p => p.status === 'discharged').length;
            document.getElementById('stat-deceased').innerText = patients.filter(p => p.status === 'deceased').length;
        }

        // Hàm lọc theo trạng thái
        window.filterByStat = function(status) {
            currentFilter = status;
            renderList();
        };

        // Hàm hiển thị danh sách
        window.renderList = function() {
            const searchTerm = document.getElementById('search-box').value.toLowerCase();
            const listContainer = document.getElementById('patient-list');
            
            const filtered = patients.filter(p => {
                const matchSearch = p.name.toLowerCase().includes(searchTerm);
                const matchFilter = currentFilter === '' || p.status === currentFilter;
                return matchSearch && matchFilter;
            });

            listContainer.innerHTML = filtered.map(p => `
                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                    <span class="text-sm font-medium text-slate-700">${p.name}</span>
                    <span class="text-[10px] uppercase font-bold px-2 py-1 rounded-full ${getStatusStyle(p.status)}">
                        ${p.status === 'treating' ? 'Đang ĐT' : p.status === 'deceased' ? 'Tử Vong' : 'Xuất Viện'}
                    </span>
                </div>
            `).join('');
            
            updateStats();
        };

        function getStatusStyle(status) {
            if (status === 'treating') return 'bg-amber-100 text-amber-700';
            if (status === 'deceased') return 'bg-red-100 text-red-700';
            return 'bg-emerald-100 text-emerald-700';
        }

        // Hàm mở sổ giao ca
        window.openHandoverModal = function() {
            const content = document.getElementById('handover-content');
            const active = patients.filter(p => p.status === 'treating');
            content.innerHTML = active.length > 0 
                ? active.map(p => `<p class="border-b border-slate-100 py-1 text-slate-700">• ${p.name}</p>`).join('') 
                : "<p class='text-slate-400 italic'>Không có bệnh nhân đang điều trị.</p>";
            document.getElementById('handover-modal').classList.remove('hidden');
        };

        // Khởi chạy
        updateStats();
        renderList();
    </script>
</body>
</html>
