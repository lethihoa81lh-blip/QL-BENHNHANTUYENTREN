<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản Lý Bệnh Nhân</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f4f9;
    padding:12px;
}

/* HEADER */

.header{
    background:#1976d2;
    color:white;
    padding:16px;
    border-radius:16px;
    margin-bottom:12px;
}

.header h1{
    margin-bottom:10px;
}

.search-box{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:15px;
}

/* BUTTONS */

.top-action{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

.top-action button{
    flex:1;
    border:none;
    padding:13px;
    border-radius:12px;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

.btn-add{
    background:#2e7d32;
}

.btn-import{
    background:#ef6c00;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:12px;
}

.stat-box{
    background:white;
    padding:14px;
    border-radius:14px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.stat-box h2{
    color:#1976d2;
    font-size:28px;
}

.stat-box p{
    color:#666;
    margin-top:5px;
}

/* TABLE */

.table-box{
    background:white;
    border-radius:16px;
    overflow:auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1100px;
}

thead{
    background:#1976d2;
    color:white;
}

th, td{
    padding:12px;
    text-align:left;
    border-bottom:1px solid #ddd;
    font-size:14px;
}

tr:hover{
    background:#f5f8ff;
}

/* STATUS */

.status{
    color:white;
    padding:5px 10px;
    border-radius:8px;
    font-size:13px;
}

.dieutri{
    background:#2e7d32;
}

.chuyenvien{
    background:#ef6c00;
}

.xuatvien{
    background:#d32f2f;
}

/* BUTTON */

.action-btn{
    border:none;
    padding:7px 10px;
    border-radius:8px;
    color:white;
    margin-right:5px;
    cursor:pointer;
}

.view-btn{
    background:#1976d2;
}

.edit-btn{
    background:#388e3c;
}

.delete-btn{
    background:#d32f2f;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    width:95%;
    max-width:500px;
    border-radius:18px;
    padding:20px;
    max-height:90%;
    overflow:auto;
}

.modal-content h2{
    margin-bottom:15px;
    color:#1976d2;
}

.input-box{
    width:100%;
    padding:12px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:10px;
}

.save-btn{
    width:100%;
    border:none;
    padding:13px;
    border-radius:12px;
    background:#1976d2;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

.close-btn{
    width:100%;
    border:none;
    padding:13px;
    border-radius:12px;
    background:#d32f2f;
    color:white;
    margin-top:10px;
    cursor:pointer;
}

.detail-item{
    margin-bottom:10px;
    font-size:15px;
}

/* MOBILE */

@media(max-width:768px){

    .stats{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <h1>🏥 Quản Lý Bệnh Nhân</h1>

    <input 
    type="text"
    class="search-box"
    placeholder="🔍 Tìm bệnh nhân..."
    onkeyup="searchPatient()"
    id="searchInput">

</div>

<!-- BUTTON -->

<div class="top-action">

    <button class="btn-add" onclick="openAddModal()">
        ➕ Thêm
    </button>

    <button class="btn-import">
        📋 Nhập Liệu
    </button>

</div>

<!-- STATS -->

<div class="stats">

    <div class="stat-box">
        <h2 id="totalPatient">0</h2>
        <p>Tổng BN</p>
    </div>

    <div class="stat-box">
        <h2 id="totalDieuTri">0</h2>
        <p>Điều trị</p>
    </div>

    <div class="stat-box">
        <h2 id="totalXuatVien">0</h2>
        <p>Xuất viện</p>
    </div>

</div>

<!-- TABLE -->

<div class="table-box">

<table id="patientTable">

<thead>

<tr>

<th>STT</th>
<th>Họ Tên</th>
<th>Năm Sinh</th>
<th>Giới Tính</th>
<th>BHYT</th>
<th>Ngày CV</th>
<th>Ngày XV</th>
<th>Bệnh Viện</th>
<th>Trạng Thái</th>
<th>Thao Tác</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

<!-- MODAL ADD -->

<div class="modal" id="addModal">

<div class="modal-content">

<h2>➕ Thêm Bệnh Nhân</h2>

<input type="text" id="name" class="input-box" placeholder="Họ tên">

<input type="text" id="birth" class="input-box" placeholder="Năm sinh">

<select id="gender" class="input-box">
<option>Nam</option>
<option>Nữ</option>
</select>

<input type="text" id="bhyt" class="input-box" placeholder="Mã BHYT">

<input type="date" id="cv" class="input-box">

<input type="date" id="xv" class="input-box">

<input type="text" id="hospital" class="input-box" placeholder="Bệnh viện">

<select id="status" class="input-box">
<option>Điều trị</option>
<option>Chuyển viện</option>
<option>Xuất viện</option>
</select>

<button class="save-btn" onclick="savePatient()">
Lưu
</button>

<button class="close-btn" onclick="closeAddModal()">
Đóng
</button>

</div>

</div>

<!-- DETAIL MODAL -->

<div class="modal" id="detailModal">

<div class="modal-content" id="detailContent">

</div>

</div>

<script>

let patients = [
{
name:"Nguyễn Văn A",
birth:"1955",
gender:"Nam",
bhyt:"123456789",
cv:"2026-05-12",
xv:"",
hospital:"BV Đồng Xoài",
status:"Điều trị"
}
];

function renderTable(){

let table = document.getElementById("tableBody");
table.innerHTML = "";

patients.forEach((p,index)=>{

let statusClass = "";

if(p.status=="Điều trị"){
statusClass = "dieutri";
}

if(p.status=="Chuyển viện"){
statusClass = "chuyenvien";
}

if(p.status=="Xuất viện"){
statusClass = "xuatvien";
}

table.innerHTML += `
<tr>

<td>${index+1}</td>

<td>${p.name}</td>

<td>${p.birth}</td>

<td>${p.gender}</td>

<td>${p.bhyt}</td>

<td>${p.cv}</td>

<td>${p.xv || "-"}</td>

<td>${p.hospital}</td>

<td>
<span class="status ${statusClass}">
${p.status}
</span>
</td>

<td>

<button class="action-btn view-btn"
onclick="viewPatient(${index})">
Chi tiết
</button>

<button class="action-btn edit-btn"
onclick="editPatient(${index})">
Sửa
</button>

<button class="action-btn delete-btn"
onclick="deletePatient(${index})">
Xóa
</button>

</td>

</tr>
`;

});

updateStats();

}

function updateStats(){

document.getElementById("totalPatient").innerText = patients.length;

document.getElementById("totalDieuTri").innerText =
patients.filter(p=>p.status=="Điều trị").length;

document.getElementById("totalXuatVien").innerText =
patients.filter(p=>p.status=="Xuất viện").length;

}

function openAddModal(){
document.getElementById("addModal").style.display="flex";
}

function closeAddModal(){
document.getElementById("addModal").style.display="none";
}

function savePatient(){

let patient = {

name:document.getElementById("name").value,
birth:document.getElementById("birth").value,
gender:document.getElementById("gender").value,
bhyt:document.getElementById("bhyt").value,
cv:document.getElementById("cv").value,
xv:document.getElementById("xv").value,
hospital:document.getElementById("hospital").value,
status:document.getElementById("status").value

};

patients.push(patient);

renderTable();

closeAddModal();

}

function deletePatient(index){

if(confirm("Xóa bệnh nhân này?")){

patients.splice(index,1);

renderTable();

}

}

function editPatient(index){

let p = patients[index];

document.getElementById("name").value = p.name;
document.getElementById("birth").value = p.birth;
document.getElementById("gender").value = p.gender;
document.getElementById("bhyt").value = p.bhyt;
document.getElementById("cv").value = p.cv;
document.getElementById("xv").value = p.xv;
document.getElementById("hospital").value = p.hospital;
document.getElementById("status").value = p.status;

patients.splice(index,1);

openAddModal();

}

function viewPatient(index){

let p = patients[index];

document.getElementById("detailContent").innerHTML = `

<h2>👤 Chi Tiết Bệnh Nhân</h2>

<div class="detail-item"><b>Họ tên:</b> ${p.name}</div>

<div class="detail-item"><b>Năm sinh:</b> ${p.birth}</div>

<div class="detail-item"><b>Giới tính:</b> ${p.gender}</div>

<div class="detail-item"><b>BHYT:</b> ${p.bhyt}</div>

<div class="detail-item"><b>Ngày chuyển viện:</b> ${p.cv}</div>

<div class="detail-item"><b>Ngày xuất viện:</b> ${p.xv || "-"}</div>

<div class="detail-item"><b>Bệnh viện:</b> ${p.hospital}</div>

<div class="detail-item"><b>Trạng thái:</b> ${p.status}</div>

<button class="close-btn"
onclick="closeDetailModal()">
Đóng
</button>

`;

document.getElementById("detailModal").style.display="flex";

}

function closeDetailModal(){

document.getElementById("detailModal").style.display="none";

}

function searchPatient(){

let input = document.getElementById("searchInput").value.toLowerCase();

let rows = document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

let text = row.innerText.toLowerCase();

row.style.display = text.includes(input) ? "" : "none";

});

}

renderTable();

</script>

</body>
</html>
