<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>QLBN Hệ thống Full</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, where, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CẤU HÌNH (Dán key của bạn vào đây)
        const firebaseConfig = { /* ... Dán config của bạn ... */ };
        const db = getFirestore(initializeApp(firebaseConfig));

        // HÀM RENDER ĐÃ TÍCH HỢP LỌC TRẠNG THÁI
        window.renderList = async () => {
            const status = document.getElementById('filter-status').value;
            const tableBody = document.getElementById('patient-table-body');
            tableBody.innerHTML = '<tr><td colspan="8" class="text-center py-4">Đang tải...</td></tr>';
            
            let q = collection(db, "patients");
            if (status) {
                q = query(collection(db, "patients"), where("status", "==", status));
            }

            const snap = await getDocs(q);
            tableBody.innerHTML = '';
            
            snap.forEach((doc) => {
                const p = doc.data();
                tableBody.innerHTML += `
                    <tr class="border-b">
                        <td class="p-2">${p.name}</td>
                        <td class="p-2">${p.status || 'treating'}</td>
                        <td class="p-2">
                            <button onclick="updatePatientStatus('${doc.id}', 'treating')" class="text-xs bg-amber-500 text-white px-2 rounded">ĐT</button>
                            <button onclick="updatePatientStatus('${doc.id}', 'discharged')" class="text-xs bg-emerald-500 text-white px-2 rounded">XV</button>
                        </td>
                    </tr>`;
            });
        };

        // CÁC HÀM TÍNH NĂNG MỚI
        window.updatePatientStatus = async (id, status) => {
            await updateDoc(doc(db, "patients", id), { status: status });
            renderList();
        };

        window.autoGenerateActiveHandover = async () => {
            const q = query(collection(db, "patients"), where("status", "==", "treating"));
            const snap = await getDocs(q);
            let text = "DANH SÁCH GIAO CA:\n";
            snap.forEach(d => { text += `- ${d.data().name}\n`; });
            document.getElementById("h-content").value = text;
        };
    </script>
</head>
<body class="p-4 bg-slate-100">
    <input type="hidden" id="filter-status" value="">
    <div class="mb-4 space-x-2">
        <button onclick="filterByStat('')" class="bg-blue-600 text-white p-2 rounded">Tất cả</button>
        <button onclick="filterByStat('treating')" class="bg-amber-500 text-white p-2 rounded">Đang ĐT</button>
        <button onclick="autoGenerateActiveHandover()" class="bg-indigo-600 text-white p-2 rounded">Trích xuất Giao ca</button>
    </div>

    <table class="w-full bg-white rounded shadow">
        <tbody id="patient-table-body"></tbody>
    </table>

    <textarea id="h-content" class="w-full h-32 mt-4 p-2 border" placeholder="Kết quả giao ca..."></textarea>
    
    <script>
        function filterByStat(s) {
            document.getElementById('filter-status').value = s;
            window.renderList();
        }
        window.onload = window.renderList;
    </script>
</body>
</html>
