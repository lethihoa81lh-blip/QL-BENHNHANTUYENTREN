<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Bệnh Nhân Tuyến Trên</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f1f4f9;padding:10px;}

.header{background:#1976d2;color:#fff;padding:16px;border-radius:16px;margin-bottom:12px;}
.search-box{width:100%;padding:12px;border:none;border-radius:10px;}

.top-action{display:flex;gap:8px;margin:10px 0;flex-wrap:wrap;}
.top-action button,.top-action select{padding:10px;border:none;border-radius:10px;}

.btn-add{background:#2e7d32;color:#fff;}
.btn-handover{background:#ef6c00;color:#fff;}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.stat-box{background:#fff;padding:12px;border-radius:12px;text-align:center;}

.table-box{background:#fff;border-radius:16px;overflow:auto;}
table{width:100%;border-collapse:collapse;min-width:1100px;}

th,td{padding:8px;border-bottom:1px solid #ddd;font-size:13px;text-align:center;}
th{background:#1976d2;color:#fff;}

.status{padding:4px 6px;border-radius:8px;color:#fff;font-size:12px;}
.dieutri{background:#2e7d32;}
.chuyenvien{background:#ef6c00;}
.xuatvien{background:#d32f2f;}

.action-btn{padding:5px 7px;border:none;border-radius:6px;color:#fff;font-size:12px;}
.view-btn{background:#1976d2;}
.edit-btn{background:#388e3c;}
.delete-btn{background:#d32f2f;}

.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);justify-content:center;align-items:center;}
.modal-content{background:#fff;width:95%;max-width:550px;padding:20px;border-radius:16px;}

.input-box{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:10px;}

.save-btn{width:100%;padding:12px;background:#1976d2;color:#fff;border:none;border-radius:10px;}
.close-btn{width:100%;padding:12px;background:#d32f2f;color:#fff;border:none;border-radius:10px;margin-top:8px;}

.dot-box{display:flex;gap:5px;justify-content:center;margin-top:5px;}
.dot-btn{padding:2px 6px;font-size:11px;border:none;border-radius:5px;color:#fff;}
.plus{background:#2e7d32;}
.minus{background:#d32f2f;}
</style>
</head>

<body>

<div class="header">
<h2>🏥 Quản Lý Nuôi Viện</h2>
<input id="searchInput" class="search-box" placeholder="Tìm bệnh nhân..." onkeyup="searchPatient()">
</div>

<div class="top-action">
<button class="btn-add" onclick="openAddModal()">➕ Thêm BN</button>
<button class="btn-handover" onclick="openHandoverBook()">📋 Sổ Giao Ca</button>
</div>

<div class="stats">
<div class="stat-box"><h3 id="totalPatient">0</h3><p>Tổng BN</p></div>
<div class="stat-box"><h3 id="totalDieuTri">0</h3><p>Điều trị</p></div>
</div>

<div class="table-box">
<table>
<thead>
<tr>
<th>STT</th><th>Họ tên</th><th>NS</th><th>GT</th>
<th>BHYT</th><th>Nhập</th><th>CV</th><th>XV</th>
<th>Đợt</th><th>BV</th><th>TT</th><th>Thao tác</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<!-- MODAL -->
<div class="modal" id="addModal">
<div class="modal-content">
<h3>Thêm/Sửa BN</h3>

<input id="name" class="input-box" placeholder="Họ tên">
<input id="birth" class="input-box" placeholder="Năm sinh">

<select id="gender" class="input-box">
<option>Nam</option><option>Nữ</option>
</select>

<input id="bhyt" class="input-box" placeholder="BHYT">
<input id="nhaptram" type="date" class="input-box">
<input id="cv" type="date" class="input-box">
<input id="xv" type="date" class="input-box">
<input id="hospital" class="input-box" placeholder="BV">

<select id="status" class="input-box">
<option>Điều trị</option>
<option>Chuyển viện</option>
<option>Xuất viện</option>
</select>

<button class="save-btn" onclick="savePatient()">Lưu</button>
<button class="close-btn" onclick="closeAddModal()">Đóng</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, update }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "ql-benhnhantuyentren.firebaseapp.com",
databaseURL: "https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "ql-benhnhantuyentren"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let patients = [];
let editId = null;
let isAdmin = true; // 🔐

function loadPatients(){
onValue(ref(db,"patients"), snap=>{
patients=[];
snap.forEach(c=>{
patients.push({id:c.key,...c.val()});
});
renderTable();
});
}

function renderTable(){
let html="";

patients.forEach((p,i)=>{

html+=`
<tr>
<td>${i+1}</td>
<td>${p.name||""}</td>
<td>${p.birth||""}</td>
<td>${p.gender||""}</td>
<td>${p.bhyt||""}</td>
<td>${p.nhaptram||""}</td>
<td>${p.cv||""}</td>
<td>${p.xv||""}</td>

<td>
${p.dotdieutri||1}

<div class="dot-box">
<button class="dot-btn plus" onclick="changeDot('${p.id}',1)">+</button>
<button class="dot-btn minus" onclick="changeDot('${p.id}',-1)">-</button>
</div>
</td>

<td>${p.hospital||""}</td>

<td><span class="status">${p.status||""}</span></td>

<td>
<button class="view-btn action-btn" onclick="viewPatient('${p.id}')">Chi tiết</button>
<button class="edit-btn action-btn" onclick="editPatient('${p.id}')">Sửa</button>

${isAdmin ? `<button class="delete-btn action-btn" onclick="deletePatient('${p.id}')">Xóa</button>` : ""}
</td>
</tr>`;
});

document.getElementById("tableBody").innerHTML = html;
}

window.changeDot = async function(id,val){
let p = patients.find(x=>x.id===id);
if(!p) return;

let newDot = (p.dotdieutri||1) + val;
if(newDot < 1) newDot = 1;

await update(ref(db,"patients/"+id),{
dotdieutri:newDot
});
};

window.deletePatient = async function(id){
if(isAdmin){
if(confirm("Xóa?")){
await remove(ref(db,"patients/"+id));
}
}
};

loadPatients();
</script>

</body>
</html>
