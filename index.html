<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản Lý Bệnh nhân tuyến trên</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f4f9;
    padding:10px;
}

/* HEADER */

.header{
    background:#1976d2;
    color:white;
    padding:16px;
    border-radius:16px;
    margin-bottom:12px;
}

.header h1{
    margin-bottom:10px;
}

.search-box{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:15px;
}

/* ACTION */

.top-action{
    display:flex;
    gap:10px;
    margin-bottom:12px;
    flex-wrap:wrap;
}

.top-action button,
.top-action select{

    border:none;
    padding:12px;
    border-radius:12px;
    font-size:14px;
}

.top-action button{
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.btn-add{
    background:#2e7d32;
}

.btn-handover{
    background:#ef6c00;
}

.year-filter{
    background:white;
}

/* STATS */

.stats{
    display:grid;
    grid-template-columns:1fr 1fr 1fr 1fr 1fr;
    gap:10px;
    margin-bottom:12px;
}

.stat-box{
    background:white;
    border-radius:14px;
    padding:14px;
    text-align:center;
    box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.stat-box h2{
    color:#1976d2;
    font-size:22px;
}

.stat-box p{
    color:#666;
    margin-top:5px;
    font-size:14px;
}

/* TABLE */

.table-box{
    background:white;
    border-radius:16px;
    overflow:auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:1300px;
}

thead{
    background:#1976d2;
    color:white;
}

th, td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:left;
    font-size:14px;
}

tr:hover{
    background:#f5f8ff;
}

/* STATUS */

.status{
    color:white;
    padding:5px 10px;
    border-radius:8px;
    font-size:13px;
}

.dieutri{
    background:#2e7d32;
}

.chuyenvien{
    background:#ef6c00;
}

.xuatvien{
    background:#d32f2f;
}

/* BUTTON */

.action-btn{
    border:none;
    padding:7px 10px;
    border-radius:8px;
    color:white;
    cursor:pointer;
    margin-right:5px;
    margin-bottom:5px;
}

.view-btn{
    background:#1976d2;
}

.edit-btn{
    background:#388e3c;
}

.delete-btn{
    background:#d32f2f;
}

/* MODAL */

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    background:white;
    width:95%;
    max-width:550px;
    max-height:90%;
    overflow:auto;
    border-radius:18px;
    padding:20px;
}

.modal-content h2{
    margin-bottom:15px;
    color:#1976d2;
}

.input-box{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:10px;
    margin-bottom:12px;
}

.save-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#1976d2;
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
}

.close-btn{
    width:100%;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#d32f2f;
    color:white;
    margin-top:10px;
    cursor:pointer;
}

.detail-item{
    margin-bottom:10px;
    font-size:15px;
}

.handover-box{
    background:#f5f5f5;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

.handover-item{
    padding:8px;
    border-bottom:1px solid #ddd;
}

/* MOBILE */

@media(max-width:768px){

.stats{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="header">

<h1>🏥 Quản Lý Nuôi Viện</h1>

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Tìm bệnh nhân..."
onkeyup="searchPatient()">

</div>

<div class="top-action">

<select
id="yearFilter"
class="year-filter"
onchange="filterByYear()">

<option value="">Tất cả năm</option>
<option value="2024">2024</option>
<option value="2025">2025</option>
<option value="2026">2026</option>

</select>

<button
class="btn-add"
onclick="openAddModal()">

➕ Thêm BN

</button>

<button
class="btn-handover"
onclick="openHandoverBook()">

📋 Sổ Giao Ca

</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-box">
<h2 id="totalPatient">0</h2>
<p>Tổng BN</p>
</div>

<div class="stat-box">
<h2 id="totalDieuTri">0</h2>
<p>Điều trị</p>
</div>

<div class="stat-box">
<h2 id="totalXuatVien">0</h2>
<p>Xuất viện</p>
</div>

<div class="stat-box">
<h2 id="totalYear">0</h2>
<p>Theo năm</p>
</div>

<div class="stat-box">
<h2 id="topHospital">-</h2>
<p>BV nhiều BN</p>
</div>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>

<tr>

<th>STT</th>
<th>Họ Tên</th>
<th>Năm Sinh</th>
<th>GT</th>
<th>BHYT</th>
<th>Ngày Nhập Trạm Xá</th>
<th>Ngày CV</th>
<th>Ngày XV</th>
<th>Bệnh Viện</th>
<th>Trạng Thái</th>
<th>Thao Tác</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<!-- ADD MODAL -->

<div class="modal" id="addModal">

<div class="modal-content">

<h2>➕ Thêm Bệnh Nhân</h2>

<input type="text" id="name" class="input-box" placeholder="Họ tên">

<input type="text" id="birth" class="input-box" placeholder="Năm sinh">

<select id="gender" class="input-box">
<option>Nam</option>
<option>Nữ</option>
</select>

<input type="text" id="bhyt" class="input-box" placeholder="Mã BHYT">

<label>Ngày nhập trạm xá</label>
<input type="date" id="nhaptram" class="input-box">

<label>Ngày chuyển viện</label>
<input type="date" id="cv" class="input-box">

<label>Ngày xuất viện</label>
<input type="date" id="xv" class="input-box">

<input type="text" id="hospital" class="input-box" placeholder="Bệnh viện">

<select id="status" class="input-box">

<option>Điều trị</option>
<option>Chuyển viện</option>
<option>Xuất viện</option>

</select>

<button class="save-btn" onclick="savePatient()">
Lưu
</button>

<button class="close-btn" onclick="closeAddModal()">
Đóng
</button>

</div>

</div>

<!-- DETAIL -->

<div class="modal" id="detailModal">

<div class="modal-content" id="detailContent">

</div>

</div>

<!-- SỔ GIAO CA -->

<div class="modal" id="handoverModal">

<div class="modal-content">

<h2>📋 Sổ Giao Ca</h2>

<div id="handoverBookContent"></div>

<button
class="close-btn"
onclick="closeHandoverBook()">

Đóng

</button>

</div>

</div>

<script>

let patients = [

{
name:"Nguyễn Văn A",
birth:"1955",
gender:"Nam",
bhyt:"123456789",
nhaptram:"2026-05-01",
cv:"2026-05-12",
xv:"",
hospital:"BV Đồng Xoài",
status:"Điều trị",

handover:[

{
date:"2026-05-20",
content:"Ăn uống ổn định"
},

{
date:"2026-05-21",
content:"Có ho nhẹ\nTheo dõi thêm"
}

]

}

];

let editIndex = -1;

/* FORMAT DATE */

function formatDate(dateString){

if(!dateString) return "-";

let date = new Date(dateString);

let day =
String(date.getDate()).padStart(2,'0');

let month =
String(date.getMonth()+1).padStart(2,'0');

let year = date.getFullYear();

return `${day}/${month}/${year}`;

}

/* RENDER */

function renderTable(){

let table =
document.getElementById("tableBody");

table.innerHTML = "";

patients.forEach((p,index)=>{

let statusClass = "";

if(p.status=="Điều trị"){
statusClass="dieutri";
}

if(p.status=="Chuyển viện"){
statusClass="chuyenvien";
}

if(p.status=="Xuất viện"){
statusClass="xuatvien";
}

table.innerHTML += `

<tr>

<td>${index+1}</td>
<td>${p.name}</td>
<td>${p.birth}</td>
<td>${p.gender}</td>
<td>${p.bhyt}</td>
<td>${formatDate(p.nhaptram)}</td>
<td>${formatDate(p.cv)}</td>
<td>${formatDate(p.xv)}</td>
<td>${p.hospital}</td>

<td>
<span class="status ${statusClass}">
${p.status}
</span>
</td>

<td>

<button
class="action-btn view-btn"
onclick="viewPatient(${index})">
Chi tiết
</button>

<button
class="action-btn edit-btn"
onclick="editPatient(${index})">
Sửa
</button>

<button
class="action-btn delete-btn"
onclick="deletePatient(${index})">
Xóa
</button>

</td>

</tr>

`;

});

updateStats();

}

/* STATS */

function updateStats(){

document.getElementById("totalPatient")
.innerText = patients.length;

document.getElementById("totalDieuTri")
.innerText =
patients.filter(
p=>p.status=="Điều trị"
).length;

document.getElementById("totalXuatVien")
.innerText =
patients.filter(
p=>p.status=="Xuất viện"
).length;

document.getElementById("totalYear")
.innerText = patients.length;

updateHospitalStats();

}

/* THỐNG KÊ BỆNH VIỆN */

function updateHospitalStats(){

let hospitalCount = {};

patients.forEach(p=>{

if(!hospitalCount[p.hospital]){
hospitalCount[p.hospital] = 0;
}

hospitalCount[p.hospital]++;

});

let topHospital = "-";
let max = 0;

for(let hospital in hospitalCount){

if(hospitalCount[hospital] > max){

max = hospitalCount[hospital];
topHospital = hospital;

}

}

document.getElementById("topHospital")
.innerText = topHospital;

}

/* MODAL */

function openAddModal(){

document.getElementById("addModal")
.style.display="flex";

}

function closeAddModal(){

document.getElementById("addModal")
.style.display="none";

clearForm();

}

/* SAVE */

function savePatient(){

let patient = {

name:
document.getElementById("name").value,

birth:
document.getElementById("birth").value,

gender:
document.getElementById("gender").value,

bhyt:
document.getElementById("bhyt").value,

nhaptram:
document.getElementById("nhaptram").value,

cv:
document.getElementById("cv").value,

xv:
document.getElementById("xv").value,

hospital:
document.getElementById("hospital").value,

status:
document.getElementById("status").value,

handover:[]

};

if(editIndex==-1){

patients.push(patient);

}else{

patient.handover =
patients[editIndex].handover;

patients[editIndex]=patient;

editIndex=-1;

}

renderTable();

closeAddModal();

}

/* EDIT */

function editPatient(index){

let p = patients[index];

editIndex = index;

document.getElementById("name").value=p.name;
document.getElementById("birth").value=p.birth;
document.getElementById("gender").value=p.gender;
document.getElementById("bhyt").value=p.bhyt;
document.getElementById("nhaptram").value=p.nhaptram;
document.getElementById("cv").value=p.cv;
document.getElementById("xv").value=p.xv;
document.getElementById("hospital").value=p.hospital;
document.getElementById("status").value=p.status;

openAddModal();

}

/* DELETE */

function deletePatient(index){

if(confirm("Xóa bệnh nhân?")){

patients.splice(index,1);

renderTable();

}

}

/* DETAIL */

function viewPatient(index){

let p = patients[index];

document.getElementById("detailContent")
.innerHTML = `

<h2>👤 Chi Tiết Bệnh Nhân</h2>

<div class="detail-item">
<b>Họ tên:</b> ${p.name}
</div>

<div class="detail-item">
<b>Năm sinh:</b> ${p.birth}
</div>

<div class="detail-item">
<b>Giới tính:</b> ${p.gender}
</div>

<div class="detail-item">
<b>BHYT:</b> ${p.bhyt}
</div>

<div class="detail-item">
<b>Ngày nhập trạm xá:</b>
${formatDate(p.nhaptram)}
</div>

<div class="detail-item">
<b>Ngày chuyển viện:</b>
${formatDate(p.cv)}
</div>

<div class="detail-item">
<b>Ngày xuất viện:</b>
${formatDate(p.xv)}
</div>

<div class="detail-item">
<b>Bệnh viện:</b>
${p.hospital}
</div>

<div class="detail-item">
<b>Trạng thái:</b>
${p.status}
</div>

<h2 style="margin-top:20px;">
📋 Giao Ca
</h2>

<div class="handover-box">

${p.handover.map(item=>`

<div class="handover-item">

📅 ${formatDate(item.date)}

<br><br>

📝 ${item.content.replace(/\n/g,"<br>")}

</div>

`).join("")}

</div>

<textarea
id="handoverText"
class="input-box"
placeholder="Nhập nội dung giao ca..."
style="height:120px;"></textarea>

<button
class="save-btn"
onclick="saveHandover(${index})">

💾 Lưu Giao Ca

</button>

<button
class="close-btn"
onclick="closeDetailModal()">

Đóng

</button>

`;

document.getElementById("detailModal")
.style.display="flex";

}

function closeDetailModal(){

document.getElementById("detailModal")
.style.display="none";

}

/* SAVE HANDOVER */

function saveHandover(index){

let text =
document.getElementById("handoverText")
.value;

if(text.trim()==""){

alert("Chưa nhập giao ca");

return;

}

patients[index].handover.push({

date:new Date()
.toISOString()
.slice(0,10),

content:text

});

viewPatient(index);

}

/* SEARCH */

function searchPatient(){

let input =
document.getElementById("searchInput")
.value.toLowerCase();

let rows =
document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

let text =
row.innerText.toLowerCase();

row.style.display =
text.includes(input) ? "" : "none";

});

}

/* FILTER YEAR */

function filterByYear(){

let year =
document.getElementById("yearFilter")
.value;

let rows =
document.querySelectorAll("#tableBody tr");

let count = 0;

rows.forEach(row=>{

let text = row.innerText;

if(year==""){

row.style.display="";
count++;

}else{

if(text.includes(year)){

row.style.display="";
count++;

}else{

row.style.display="none";

}

}

});

document.getElementById("totalYear")
.innerText = count;

}

/* CLEAR */

function clearForm(){

document.getElementById("name").value="";
document.getElementById("birth").value="";
document.getElementById("bhyt").value="";
document.getElementById("nhaptram").value="";
document.getElementById("cv").value="";
document.getElementById("xv").value="";
document.getElementById("hospital").value="";

}

/* SỔ GIAO CA */

function openHandoverBook(){

let html = "";

patients.forEach(p=>{

p.handover.forEach(h=>{

html += `

<div class="handover-item">

<b>👤 ${p.name}</b>

<br><br>

📅 ${formatDate(h.date)}

<br><br>

📝 ${h.content.replace(/\n/g,"<br>")}

</div>

`;

});

});

document.getElementById(
"handoverBookContent"
).innerHTML = html;

document.getElementById(
"handoverModal"
).style.display="flex";

}

function closeHandoverBook(){

document.getElementById(
"handoverModal"
).style.display="none";

}

renderTable();

</script>

</body>
</html>
