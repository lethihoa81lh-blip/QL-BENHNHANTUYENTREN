<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Bệnh Nhân Tuyến Trên</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f4f9;
padding:10px;
}

.header{
background:#1976d2;
color:white;
padding:16px;
border-radius:16px;
margin-bottom:12px;
}

.header h1{
margin-bottom:10px;
font-size:22px;
}

.search-box{
width:100%;
padding:12px;
border:none;
border-radius:10px;
font-size:15px;
}

.top-action{
display:flex;
gap:8px;
margin-bottom:12px;
flex-wrap:wrap;
}

.top-action button,
.top-action select{
border:none;
padding:10px;
border-radius:10px;
font-size:13px;
}

.top-action button{
color:white;
font-weight:bold;
cursor:pointer;
}

.btn-add{
background:#2e7d32;
}

.btn-handover{
background:#ef6c00;
}

.year-filter{
background:white;
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:12px;
}

.stat-box{
background:white;
border-radius:14px;
padding:12px;
text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
cursor:pointer;
}

.stat-box h2{
color:#1976d2;
font-size:20px;
}

.stat-box p{
color:#666;
margin-top:5px;
font-size:13px;
}

.table-box{
background:white;
border-radius:16px;
overflow:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

table{
width:100%;
border-collapse:collapse;
min-width:1250px;
table-layout:fixed;
}

thead{
background:#1976d2;
color:white;
}

th,td{
padding:8px 6px;
border:1px solid #b0bec5;
text-align:center;
font-size:13px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

tbody tr:nth-child(even){
background:#f7f9fc;
}

tbody tr:hover{
background:#e3f2fd;
}

td:nth-child(2){
white-space:normal;
line-height:1.3;
font-weight:bold;
text-align:left;
}

.action-btn{
border:none;
padding:5px 7px;
border-radius:7px;
color:white;
cursor:pointer;
margin:2px;
font-size:12px;
}

.view-btn{
background:#1976d2;
}

.edit-btn{
background:#388e3c;
}

.delete-btn{
background:#d32f2f;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
justify-content:center;
align-items:center;
z-index:999;
}

.modal-content{
background:white;
width:95%;
max-width:550px;
max-height:90%;
overflow:auto;
border-radius:18px;
padding:20px;
}

.input-box{
width:100%;
padding:12px;
border:1px solid #ccc;
border-radius:10px;
margin-bottom:12px;
}

.save-btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#1976d2;
color:white;
font-size:15px;
font-weight:bold;
cursor:pointer;
}

.close-btn{
width:100%;
padding:13px;
border:none;
border-radius:12px;
background:#d32f2f;
color:white;
margin-top:10px;
cursor:pointer;
}

.detail-item{
margin-bottom:10px;
font-size:15px;
}

.handover-box{
background:#f5f5f5;
padding:10px;
border-radius:10px;
margin-top:10px;
margin-bottom:10px;
}

.handover-item{
padding:10px;
border-bottom:1px solid #ddd;
margin-bottom:8px;
}

</style>
</head>

<body>

<div class="header">

<h1>🏥 Quản Lý Bệnh Nhân Tuyến Trên</h1>

<input
type="text"
id="searchInput"
class="search-box"
placeholder="🔍 Tìm bệnh nhân..."
onkeyup="applyFilters()">

</div>

<div class="top-action">

<select
id="yearFilter"
class="year-filter"
onchange="applyFilters()">

<option value="">Tất cả năm</option>
<option value="2024">2024</option>
<option value="2025">2025</option>
<option value="2026">2026</option>

</select>

<select
id="hospitalFilter"
class="year-filter"
onchange="applyFilters()">

<option value="">Tất cả BV</option>

</select>

<select
id="statusFilter"
class="year-filter"
onchange="applyFilters()">

<option value="">Tất cả</option>

<option value="dieutri">
Đang điều trị
</option>

<option value="xuatvien">
Xuất viện
</option>

</select>

<button
class="btn-add"
onclick="openAddModal()">

➕ Thêm BN

</button>

<button
class="btn-handover"
onclick="openHandoverBook()">

📋 Sổ Giao Ca

</button>

</div>

<div class="stats">

<div class="stat-box" onclick="filterStatus('all')">
<h2 id="totalPatient">0</h2>
<p>Tổng BN</p>
</div>

<div class="stat-box" onclick="filterStatus('dieutri')">
<h2 id="totalDieuTri">0</h2>
<p>Đang điều trị</p>
</div>

<div class="stat-box" onclick="filterStatus('xuatvien')">
<h2 id="totalXuatVien">0</h2>
<p>Xuất viện</p>
</div>

<div class="stat-box">
<h2 id="hospitalCount">0</h2>
<p>Số bệnh viện</p>
</div>

</div>

<div class="table-box">

<table>

<thead>

<tr>

<th style="width:45px">STT</th>
<th style="width:160px">Họ Tên</th>
<th style="width:70px">NS</th>
<th style="width:55px">GT</th>
<th style="width:130px">BHYT</th>
<th style="width:180px">Chẩn đoán</th>
<th style="width:110px">Nhập trạm</th>
<th style="width:110px">Chuyển viện</th>
<th style="width:110px">Xuất viện</th>
<th style="width:70px">Đợt</th>
<th style="width:170px">Bệnh viện</th>
<th style="width:170px">Thao Tác</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<div class="modal" id="addModal">

<div class="modal-content">

<h2>➕ Thêm / Sửa Bệnh Nhân</h2>

<input type="text" id="name" class="input-box" placeholder="Họ tên">

<input type="text" id="birth" class="input-box" placeholder="Năm sinh">

<select id="gender" class="input-box">
<option>Nam</option>
<option>Nữ</option>
</select>

<input type="text" id="bhyt" class="input-box" placeholder="Mã BHYT">

<label>Ngày nhập trạm xá</label>
<input type="date" id="nhaptram" class="input-box">

<input type="text" id="chandoan" class="input-box" placeholder="Chẩn đoán">

<label>Ngày chuyển viện</label>
<input type="date" id="cv" class="input-box">

<label>Ngày xuất viện</label>
<input type="date" id="xv" class="input-box">

<input type="text" id="hospital" class="input-box" placeholder="Bệnh viện">

<button class="save-btn" id="saveBtn" onclick="savePatient()">
💾 Lưu
</button>

<button class="close-btn" onclick="closeAddModal()">
Đóng
</button>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getDatabase,
ref,
push,
set,
onValue,
remove,
update
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "AIzaSyACL3APi2ZmSK-ZhkSsygSIZvnu8_dvzSc",
authDomain: "ql-benhnhantuyentren.firebaseapp.com",
projectId: "ql-benhnhantuyentren",
storageBucket: "ql-benhnhantuyentren.firebasestorage.app",
messagingSenderId: "127051253047",
appId: "1:127051253047:web:12899a0b0f28d0addd86b2",
measurementId: "G-0JPKGYLJK0"

};

const app = initializeApp(firebaseConfig);

const db = getDatabase(
app,
"https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app"
);

let patients = [];
let editId = null;

function formatDate(dateString){

if(!dateString) return "-";

let date = new Date(dateString);

let day =
String(date.getDate()).padStart(2,'0');

let month =
String(date.getMonth()+1).padStart(2,'0');

let year = date.getFullYear();

return `${day}/${month}/${year}`;

}

function loadPatients(){

const patientRef = ref(db,"patients");

onValue(patientRef,(snapshot)=>{

patients = [];

snapshot.forEach((child)=>{

patients.push({
id:child.key,
...child.val()
});

});

patients.reverse();

renderTable();

});

}

function renderTable(){

let table =
document.getElementById("tableBody");

table.innerHTML = "";

patients.forEach((p,index)=>{

table.innerHTML += `

<tr>

<td>${index+1}</td>
<td>${p.name || ""}</td>
<td>${p.birth || ""}</td>
<td>${p.gender || ""}</td>
<td>${p.bhyt || ""}</td>
<td>${p.chandoan || ""}</td>
<td>${formatDate(p.nhaptram)}</td>
<td>${formatDate(p.cv)}</td>
<td>${formatDate(p.xv)}</td>
<td>${p.dotdieutri || 1}</td>
<td>${p.hospital || ""}</td>

<td>

<button
class="action-btn view-btn"
onclick="editPatient('${p.id}')">
Sửa
</button>

<button
class="action-btn delete-btn"
onclick="deletePatient('${p.id}')">
Xóa
</button>

</td>

</tr>

`;

});

updateStats();
loadHospitalFilter();

}

function updateStats(){

document.getElementById("totalPatient")
.innerText = patients.length;

document.getElementById("totalDieuTri")
.innerText =
patients.filter(
p => !p.xv || p.xv == ""
).length;

document.getElementById("totalXuatVien")
.innerText =
patients.filter(
p => p.xv && p.xv != ""
).length;

let hospitals =
[...new Set(
patients.map(p=>p.hospital)
)];

document.getElementById("hospitalCount")
.innerText =
hospitals.filter(Boolean).length;

}

function loadHospitalFilter(){

let select =
document.getElementById("hospitalFilter");

let hospitals =
[...new Set(
patients.map(p=>p.hospital)
)];

select.innerHTML =
'<option value="">Tất cả BV</option>';

hospitals.forEach(h=>{

if(h){

select.innerHTML += `
<option value="${h}">
${h}
</option>
`;

}

});

}

window.openAddModal = function(){

document.getElementById("addModal")
.style.display="flex";

}

window.closeAddModal = function(){

document.getElementById("addModal")
.style.display="none";

clearForm();

}

function clearForm(){

document.getElementById("name").value="";
document.getElementById("birth").value="";
document.getElementById("bhyt").value="";
document.getElementById("nhaptram").value="";
document.getElementById("cv").value="";
document.getElementById("xv").value="";
document.getElementById("hospital").value="";
document.getElementById("chandoan").value="";

editId = null;

}

window.savePatient = async function(){

let btn =
document.getElementById("saveBtn");

btn.disabled=true;
btn.innerText="Đang lưu...";

try{

let patient = {

name:
document.getElementById("name").value,

birth:
document.getElementById("birth").value,

gender:
document.getElementById("gender").value,

bhyt:
document.getElementById("bhyt").value,

nhaptram:
document.getElementById("nhaptram").value,

cv:
document.getElementById("cv").value,

xv:
document.getElementById("xv").value,

hospital:
document.getElementById("hospital").value,

chandoan:
document.getElementById("chandoan").value,

dotdieutri:1

};

if(editId==null){

const newRef =
push(ref(db,"patients"));

await set(newRef,patient);

}else{

await update(
ref(db,"patients/"+editId),
patient
);

}

closeAddModal();

}catch(err){

alert("Lỗi lưu dữ liệu");

console.log(err);

}

btn.disabled=false;
btn.innerText="💾 Lưu";

}

window.editPatient = function(id){

let p =
patients.find(x=>x.id===id);

if(!p) return;

editId=id;

document.getElementById("name").value=p.name || "";
document.getElementById("birth").value=p.birth || "";
document.getElementById("gender").value=p.gender || "";
document.getElementById("bhyt").value=p.bhyt || "";
document.getElementById("nhaptram").value=p.nhaptram || "";
document.getElementById("cv").value=p.cv || "";
document.getElementById("xv").value=p.xv || "";
document.getElementById("hospital").value=p.hospital || "";
document.getElementById("chandoan").value=p.chandoan || "";

openAddModal();

}

window.deletePatient = async function(id){

let password =
prompt("Nhập mật khẩu Admin để xoá");

if(password == null){
return;
}

password = password.trim();

if(password !== "571810"){

alert("Sai mật khẩu Admin");

return;

}

if(confirm("Xác nhận xoá bệnh nhân?")){

await remove(
ref(db,"patients/"+id)
);

}

}

window.applyFilters = function(){

let search =
document.getElementById("searchInput")
.value.toLowerCase();

let year =
document.getElementById("yearFilter")
.value;

let hospital =
document.getElementById("hospitalFilter")
.value.toLowerCase();

let status =
document.getElementById("statusFilter")
.value;

let rows =
document.querySelectorAll("#tableBody tr");

rows.forEach(row=>{

let text =
row.innerText.toLowerCase();

let cells =
row.querySelectorAll("td");

let xv = "";

if(cells[8]){
xv = cells[8].innerText.trim();
}

let matchSearch =
text.includes(search);

let matchYear =
year=="" || text.includes(year);

let matchHospital =
hospital=="" || text.includes(hospital);

let matchStatus = true;

if(status=="dieutri"){

matchStatus =
(xv=="-" || xv=="");

}

if(status=="xuatvien"){

matchStatus =
(xv!="-" && xv!="");

}

row.style.display =
(matchSearch &&
matchYear &&
matchHospital &&
matchStatus)
? ""
: "none";

});

}

window.filterStatus = function(type){

document.getElementById("statusFilter").value =
type=="all" ? "" : type;

applyFilters();

}

loadPatients();

</script>

</body>
</html>
