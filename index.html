<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quản Lý Bệnh Nhân Tuyến Trên</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#f1f4f9;padding:10px;}

.header{
background:#1976d2;color:white;padding:16px;border-radius:16px;margin-bottom:12px;
}

.header h1{margin-bottom:10px;font-size:22px;}

.search-box{
width:100%;padding:12px;border:none;border-radius:10px;font-size:15px;
}

.top-action{
display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;
}

.top-action button,.top-action select{
border:none;padding:10px;border-radius:10px;font-size:13px;
}

.top-action button{color:white;font-weight:bold;cursor:pointer;}

.btn-add{background:#2e7d32;}
.btn-handover{background:#ef6c00;}

.year-filter{background:white;}

.stats{
display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;
}

.stat-box{
background:white;border-radius:14px;padding:12px;text-align:center;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
}

.stat-box h2{color:#1976d2;font-size:20px;}
.stat-box p{color:#666;margin-top:5px;font-size:13px;}

.table-box{
background:white;border-radius:16px;overflow:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

table{width:100%;border-collapse:collapse;min-width:1050px;table-layout:fixed;}

thead{background:#1976d2;color:white;}

th,td{
padding:8px 6px;border-bottom:1px solid #ddd;text-align:center;
font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

td:nth-child(2){
white-space:normal;text-align:left;font-weight:bold;
}

.status{color:white;padding:4px 6px;border-radius:8px;font-size:12px;}
.dieutri{background:#2e7d32;}
.chuyenvien{background:#ef6c00;}
.xuatvien{background:#d32f2f;}

.action-btn{
border:none;padding:5px 7px;border-radius:7px;color:white;
cursor:pointer;margin:2px;font-size:12px;
}

.view-btn{background:#1976d2;}
.edit-btn{background:#388e3c;}
.delete-btn{background:#d32f2f;}

.modal{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:999;
}

.modal-content{
background:white;width:95%;max-width:550px;max-height:90%;
overflow:auto;border-radius:18px;padding:20px;
}

.input-box{
width:100%;padding:12px;border:1px solid #ccc;border-radius:10px;margin-bottom:12px;
}

.save-btn{
width:100%;padding:13px;border:none;border-radius:12px;
background:#1976d2;color:white;font-weight:bold;
}

.close-btn{
width:100%;padding:13px;border:none;border-radius:12px;
background:#d32f2f;color:white;margin-top:10px;
}

.small-btn{
padding:8px 10px;border:none;border-radius:10px;
background:#444;color:white;margin-top:5px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h1>🏥 Quản Lý Bệnh Nhân Tuyến Trên</h1>
<input type="text" id="searchInput" class="search-box"
placeholder="🔍 Tìm bệnh nhân..." onkeyup="searchPatient()">
</div>

<div class="top-action">

<button class="btn-add" onclick="openAddModal()">➕ Thêm BN</button>
<button class="btn-handover" onclick="openHandoverBook()">📋 Sổ Giao Ca</button>

</div>

<table class="table-box">
<thead>
<tr>
<th>STT</th>
<th>Họ Tên</th>
<th>NS</th>
<th>GT</th>
<th>BHYT</th>
<th>BV</th>
<th>Đợt</th>
<th>TT</th>
<th>Thao Tác</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<!-- FORM -->
<div class="modal" id="addModal">
<div class="modal-content">

<h3>Thêm / Sửa bệnh nhân</h3>

<input id="name" class="input-box" placeholder="Họ tên">
<input id="birth" class="input-box" placeholder="Năm sinh">
<input id="bhyt" class="input-box" placeholder="BHYT">
<input id="hospital" class="input-box" placeholder="Bệnh viện">

<select id="gender" class="input-box">
<option>Nam</option>
<option>Nữ</option>
</select>

<select id="status" class="input-box">
<option>Điều trị</option>
<option>Chuyển viện</option>
<option>Xuất viện</option>
</select>

<button class="save-btn" onclick="savePatient()">Lưu</button>
<button class="close-btn" onclick="closeAddModal()">Đóng</button>

</div>
</div>

<!-- DETAIL -->
<div class="modal" id="detailModal">
<div class="modal-content" id="detailContent"></div>
</div>

<script type="module">

import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getDatabase,ref,push,set,onValue,remove,update}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const USER_ROLE = "admin"; // <<< đổi "user" nếu không phải admin

const firebaseConfig = {
apiKey:"xxx",
authDomain:"xxx",
projectId:"xxx",
storageBucket:"xxx",
messagingSenderId:"xxx",
appId:"xxx"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let patients=[];
let editId=null;

function load(){
onValue(ref(db,"patients"),snap=>{
patients=[];
snap.forEach(i=>patients.push({id:i.key,...i.val()}));
render();
});
}

function render(){
let html="";
patients.forEach((p,i)=>{

html+=`
<tr>
<td>${i+1}</td>
<td>${p.name}</td>
<td>${p.birth}</td>
<td>${p.gender}</td>
<td>${p.bhyt}</td>
<td>${p.hospital}</td>
<td>${p.dot || 1}</td>
<td>${p.status}</td>

<td>

<button onclick="view('${p.id}')">Chi tiết</button>
<button onclick="edit('${p.id}')">Sửa</button>

${USER_ROLE==="admin"
? `<button onclick="del('${p.id}')">Xóa</button>`
: ""}

<button onclick="addDot('${p.id}')">+ Đợt</button>

</td>
</tr>`;
});

document.getElementById("tableBody").innerHTML=html;
}

window.addDot=async function(id){
let p=patients.find(x=>x.id===id);
await update(ref(db,"patients/"+id),{
dot:(p.dot||1)+1,
history:[...(p.history||[]),{
dot:(p.dot||1)+1,
date:new Date().toISOString().slice(0,10)
}]
});
}

window.del=async function(id){
if(USER_ROLE!=="admin") return alert("Không có quyền xoá!");
if(confirm("Xoá bệnh nhân?")){
await remove(ref(db,"patients/"+id));
}
}

window.savePatient=async function(){
let data={
name:name.value,
birth:birth.value,
gender:gender.value,
bhyt:bhyt.value,
hospital:hospital.value,
status:status.value,
dot:1,
history:[]
};

if(editId){
await update(ref(db,"patients/"+editId),data);
}else{
await set(push(ref(db,"patients")),data);
}
closeAddModal();
}

window.edit=function(id){
let p=patients.find(x=>x.id===id);
editId=id;
name.value=p.name;
birth.value=p.birth;
gender.value=p.gender;
bhyt.value=p.bhyt;
hospital.value=p.hospital;
status.value=p.status;
openAddModal();
}

window.view=function(id){
let p=patients.find(x=>x.id===id);

document.getElementById("detailContent").innerHTML=`
<h3>${p.name}</h3>
<p>Đợt điều trị: ${p.dot||1}</p>

<button class="small-btn" onclick="addDot('${p.id}')">
➕ Thêm đợt điều trị
</button>

<h4>Lịch sử</h4>
${(p.history||[]).map(h=>`
<div>Đợt ${h.dot} - ${h.date}</div>
`).join("")}

<button class="close-btn" onclick="closeDetail()">Đóng</button>
`;

document.getElementById("detailModal").style.display="flex";
}

window.closeDetail=()=>{
document.getElementById("detailModal").style.display="none";
}

window.openAddModal=()=>addModal.style.display="flex";
window.closeAddModal=()=>addModal.style.display="none";

window.searchPatient=function(){
let v=searchInput.value.toLowerCase();
document.querySelectorAll("tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(v)?"":"none";
});
}

load();
</script>

</body>
</html>
