<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quản Lý Bệnh Nhân</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f1f4f9;
    padding:12px;
}

/* HEADER */

.header{
    background:#1976d2;
    color:white;
    padding:16px;
    border-radius:16px;
    margin-bottom:12px;
}

.header h1{
    font-size:24px;
    margin-bottom:10px;
}

.search-box{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:15px;
}

/* BUTTON */

.top-action{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

.top-action button{
    flex:1;
    border:none;
    padding:13px;
    border-radius:12px;
    color:white;
    font-size:15px;
    font-weight:bold;
}

.btn-add{
    background:#2e7d32;
}

.btn-input{
    background:#ef6c00;
}

/* TABLE */

.table-box{
    background:white;
    border-radius:16px;
    overflow:auto;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

table{
    width:100%;
    border-collapse:collapse;
    min-width:850px;
}

thead{
    background:#1976d2;
    color:white;
}

th{
    padding:14px 10px;
    text-align:left;
    font-size:14px;
}

td{
    padding:12px 10px;
    border-bottom:1px solid #ddd;
    font-size:14px;
}

tr:hover{
    background:#f5f8ff;
}

/* STATUS */

.status{
    padding:5px 10px;
    border-radius:8px;
    color:white;
    font-size:13px;
    display:inline-block;
}

.dieutri{
    background:#2e7d32;
}

.chuyenvien{
    background:#ef6c00;
}

.xuatvien{
    background:#d32f2f;
}

/* ACTION BUTTON */

.action-btn{
    border:none;
    padding:7px 10px;
    border-radius:8px;
    color:white;
    margin-right:5px;
    cursor:pointer;
    font-size:13px;
}

.edit-btn{
    background:#1976d2;
}

.delete-btn{
    background:#d32f2f;
}

/* MOBILE */

@media(max-width:768px){

    body{
        padding:8px;
    }

    .header h1{
        font-size:20px;
    }

    th, td{
        font-size:13px;
        padding:10px 8px;
    }

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

    <h1>🏥 Quản Lý Bệnh Nhân</h1>

    <input 
    type="text"
    class="search-box"
    placeholder="🔍 Tìm bệnh nhân...">

</div>

<!-- ACTION -->

<div class="top-action">

    <button class="btn-add">
        ➕ Thêm Bệnh Nhân
    </button>

    <button class="btn-input">
        📋 Nhập Liệu
    </button>

</div>

<!-- TABLE -->

<div class="table-box">

<table>

<thead>
<tr>

    <th>STT</th>
    <th>Họ Tên</th>
    <th>Năm Sinh</th>
    <th>Giới Tính</th>
    <th>BHYT</th>
    <th>Ngày CV</th>
    <th>Bệnh Viện</th>
    <th>Trạng Thái</th>
    <th>Thao Tác</th>

</tr>
</thead>

<tbody>

<tr>

    <td>1</td>
    <td>Nguyễn Văn A</td>
    <td>1955</td>
    <td>Nam</td>
    <td>123456789</td>
    <td>12/05/2026</td>
    <td>BV Đồng Xoài</td>

    <td>
        <span class="status dieutri">
            Điều trị
        </span>
    </td>

    <td>

        <button class="action-btn edit-btn">
            Sửa
        </button>

        <button class="action-btn delete-btn">
            Xóa
        </button>

    </td>

</tr>

<tr>

    <td>2</td>
    <td>Trần Thị B</td>
    <td>1962</td>
    <td>Nữ</td>
    <td>987654321</td>
    <td>09/05/2026</td>
    <td>BV Bình Dương</td>

    <td>
        <span class="status chuyenvien">
            Chuyển viện
        </span>
    </td>

    <td>

        <button class="action-btn edit-btn">
            Sửa
        </button>

        <button class="action-btn delete-btn">
            Xóa
        </button>

    </td>

</tr>

<tr>

    <td>3</td>
    <td>Lê Văn C</td>
    <td>1948</td>
    <td>Nam</td>
    <td>555222111</td>
    <td>02/05/2026</td>
    <td>BV Chợ Rẫy</td>

    <td>
        <span class="status xuatvien">
            Xuất viện
        </span>
    </td>

    <td>

        <button class="action-btn edit-btn">
            Sửa
        </button>

        <button class="action-btn delete-btn">
            Xóa
        </button>

    </td>

</tr>

</tbody>

</table>

</div>

</body>
</html>
