<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Bệnh Nhân Tuyến Trên</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #eef2f3;
            color: #333;
        }
        .app-container {
            max-width: 700px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #34495e;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        input[type="text"]:focus {
            border-color: #3498db;
            outline: none;
        }
        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            background-color: #2980b9;
        }
        .list-section {
            margin-top: 30px;
        }
        .list-title {
            font-size: 18px;
            color: #2c3e50;
            border-left: 4px solid #2ecc71;
            padding-left: 10px;
            margin-bottom: 15px;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        li {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }
        .patient-info {
            font-weight: bold;
            color: #2c3e50;
        }
        .patient-time {
            font-size: 12px;
            color: #7f8c8d;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Quản Lý Bệnh Nhân Tuyến Trên</h2>
    
    <div class="form-group">
        <label for="txtPatientId">Mã số bệnh nhân:</label>
        <input type="text" id="txtPatientId" placeholder="Nhập mã số (Ví dụ: BN993)">
    </div>
    
    <div class="form-group">
        <label for="txtPatientName">Họ và tên bệnh nhân:</label>
        <input type="text" id="txtPatientName" placeholder="Nhập đầy đủ họ và tên">
    </div>
    
    <button class="btn-submit" id="btnRegister">Cập Nhật Tuyến Trên</button>

    <div class="list-section">
        <div class="list-title">Danh sách bệnh nhân (Đồng bộ đa thiết bị)</div>
        <ul id="livePatientList">
            <li>Đang kết nối đến máy chủ dữ liệu...</li>
        </ul>
    </div>
</div>

<script type="module">
    // Nhập các hàm thiết lập từ thư viện Firebase CDN (Dành cho file HTML chạy trực tiếp)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // Cấu hình Firebase gốc của bạn (Đã sửa lỗi chữ "URL cơ sở dữ liệu" thành "databaseURL")
    const firebaseConfig = {
        apiKey: "AIzaSyACL3APi2ZmSK-ZhkSsygSIZvnu8_dvzSc",
        authDomain: "ql-benhnhantuyentren.firebaseapp.com",
        databaseURL: "https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app", 
        projectId: "ql-benhnhantuyentren",
        storageBucket: "ql-benhnhantuyentren.firebasestorage.app",
        messagingSenderId: "127051253047",
        appId: "1:127051253047:web:12899a0b0f28d0addd86b2",
        measurementId: "G-0JPKGYLJK0"
    };

    // Khởi tạo ứng dụng và kết nối cơ sở dữ liệu
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // Lấy các phần tử giao diện từ HTML để xử lý bằng JavaScript
    const inputId = document.getElementById('txtPatientId');
    const inputName = document.getElementById('txtPatientName');
    const buttonRegister = document.getElementById('btnRegister');
    const uiList = document.getElementById('livePatientList');

    // HÀM 1: Gửi dữ liệu bệnh nhân mới lên đám mây Firebase khi nhấn nút
    buttonRegister.addEventListener('click', () => {
        const patientId = inputId.value.trim();
        const patientName = inputName.value.trim();

        // Kiểm tra xem người dùng đã nhập đủ thông tin chưa
        if (patientId === "" || patientName === "") {
            alert("Vui lòng nhập đầy đủ Mã số và Tên bệnh nhân trước khi lưu!");
            return;
        }

        // Tạo mốc thời gian hiện tại để ghi nhận lúc cập nhật
        const currentTime = new Date().toLocaleString('vi-VN');

        // Thực hiện ghi dữ liệu vào nhánh 'danh_sach_benh_nhan/MÃ_SỐ_BỆNH_NHÂN'
        set(ref(db, 'danh_sach_benh_nhan/' + patientId), {
            ho_ten: patientName,
            ngay_cap_nhat: currentTime
        })
        .then(() => {
            alert("Đã đồng bộ dữ liệu bệnh nhân thành công lên hệ thống!");
            // Xóa sạch ô nhập liệu để sẵn sàng nhập ca tiếp theo
            inputId.value = "";
            inputName.value = "";
        })
        .catch((error) => {
            alert("Không thể lưu dữ liệu. Lỗi: " + error.message);
        });
    });

    // HÀM 2: Lắng nghe tự động (Realtime) - Tính năng cốt lõi để đồng bộ đa thiết bị
    // Khi bất kỳ máy tính hay điện thoại nào thêm dữ liệu, hàm này sẽ tự kích hoạt trên toàn bộ các thiết bị khác.
    onValue(ref(db, 'danh_sach_benh_nhan'), (snapshot) => {
        // Xóa danh sách hiển thị cũ trên màn hình để nạp lại từ đầu
        uiList.innerHTML = ""; 

        if (snapshot.exists()) {
            const allPatients = snapshot.val();
            
            // Duyệt qua từng bệnh nhân có trong cơ sở dữ liệu
            for (let id in allPatients) {
                const item = allPatients[id];
                
                // Tạo một thẻ danh sách <li> mới cho giao diện
                const liElement = document.createElement('li');
                liElement.innerHTML = `
                    <span class="patient-info">[${id}] - ${item.ho_ten}</span>
                    <span class="patient-time">${item.ngay_cap_nhat || ''}</span>
                `;
                
                // Đưa thẻ <li> này vào danh sách hiển thị trên màn hình
                uiList.appendChild(liElement);
            }
        } else {
            // Trường hợp cơ sở dữ liệu trống, chưa có hồ sơ nào
            uiList.innerHTML = "<li>Hiện tại chưa có bệnh nhân nào trong danh sách dữ liệu tuyến trên.</li>";
        }
    });
</script>

</body>
</html>
