<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Firebase</title>
</head>
<body>
    <h1>Đang kiểm tra Firebase...</h1>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACL3APi2ZmSK-ZhkSsygSIZvnu8_dvzSc",
            authDomain: "ql-benhnhantuyentren.firebaseapp.com",
            databaseURL: "https://ql-benhnhantuyentren-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ql-benhnhantuyentren",
            storageBucket: "ql-benhnhantuyentren.firebasestorage.app",
            messagingSenderId: "127051253047",
            appId: "1:127051253047:web:12899a0b0f28d0addd86b2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        get(ref(db, "patients")).then((snapshot) => {
            const data = snapshot.val();

            console.log("Firebase patients:", data);

            document.body.innerHTML =
                "<h1>Tải thành công " +
                (data ? data.length : 0) +
                " bệnh nhân từ Firebase</h1>";
        }).catch((err) => {
            console.error(err);
            document.body.innerHTML =
                "<h1>Lỗi Firebase: " + err.message + "</h1>";
        });
    </script>
</body>
</html>
